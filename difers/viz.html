<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DifERS Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var BLUE='#6C8EBF', ORANGE='#D79B00', GREEN='#82B366', PURPLE='#9673A6';
  var BG='#fdfdfe';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function haloText(text,x,y,fill,hp){
    hp=hp||5; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  // Grid size for mini images
  var G=12;

  // Generate a precipitation "storm" pattern (12x12)
  var precipPattern=[];
  for(var gy=0;gy<G;gy++){
    precipPattern[gy]=[];
    for(var gx=0;gx<G;gx++){
      var dx=(gx-7)/3, dy=(gy-5)/3;
      var d=Math.sqrt(dx*dx+dy*dy);
      var v=Math.max(0, Math.exp(-d*d*0.8));
      var dx2=(gx-3)/2, dy2=(gy-9)/2;
      var v2=Math.max(0, Math.exp(-dx2*dx2-dy2*dy2)*0.6);
      precipPattern[gy][gx]=Math.min(1, v+v2);
    }
  }

  // Generate fixed noise for each ensemble member
  var N_ENS=6;
  var ensNoise=[];
  for(var e=0;e<N_ENS;e++){
    ensNoise[e]=[];
    for(var gy=0;gy<G;gy++){
      ensNoise[e][gy]=[];
      for(var gx=0;gx<G;gx++){
        ensNoise[e][gy][gx]=(Math.random()-0.5)*0.25;
      }
    }
  }

  // Fixed noise pattern for denoising visualization
  var noiseGrid=[];
  for(var gy=0;gy<G;gy++){
    noiseGrid[gy]=[];
    for(var gx=0;gx<G;gx++){
      noiseGrid[gy][gx]=Math.random();
    }
  }

  // MW brightness temperature pattern
  var mwGrid=[];
  for(var gy=0;gy<G;gy++){
    mwGrid[gy]=[];
    for(var gx=0;gx<G;gx++){
      mwGrid[gy][gx]=0.7-precipPattern[gy][gx]*0.5+(Math.random()-0.5)*0.1;
    }
  }

  // IR cloud top temperature pattern
  var irGrid=[];
  for(var gy=0;gy<G;gy++){
    irGrid[gy]=[];
    for(var gx=0;gx<G;gx++){
      irGrid[gy][gx]=0.8-precipPattern[gy][gx]*0.6+(Math.random()-0.5)*0.08;
    }
  }

  // Color maps
  function precipColor(v){
    if(v<0.05) return 'rgba(200,210,230,0.3)';
    var r,g,b;
    if(v<0.33){ var t=v/0.33; r=lerp(50,50,t); g=lerp(100,180,t); b=lerp(200,100,t); }
    else if(v<0.66){ var t=(v-0.33)/0.33; r=lerp(50,230,t); g=lerp(180,200,t); b=lerp(100,50,t); }
    else{ var t=(v-0.66)/0.34; r=lerp(230,200,t); g=lerp(200,50,t); b=lerp(50,30,t); }
    return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
  }
  function mwColor(v){
    v=Math.max(0,Math.min(1,v));
    return 'rgb('+Math.round(180+v*70)+','+Math.round(100+v*100)+','+Math.round(50+v*50)+')';
  }
  function irColor(v){
    v=Math.max(0,Math.min(1,v));
    return 'rgb('+Math.round(40+v*60)+','+Math.round(60+v*120)+','+Math.round(140+v*110)+')';
  }
  function noiseColor(v){
    var c=Math.round(80+v*140);
    return 'rgb('+c+','+c+','+c+')';
  }
  function uncertColor(v){
    v=Math.max(0,Math.min(1,v));
    return 'rgb('+Math.round(240-v*100)+','+Math.round(240-v*140)+','+Math.round(240-v*50)+')';
  }

  // Draw a mini grid image
  function drawGrid(x,y,sz,grid,colorFn,alpha){
    var cellSz=sz/G;
    ctx.save();
    ctx.globalAlpha=alpha||1;
    for(var gy=0;gy<G;gy++){
      for(var gx=0;gx<G;gx++){
        ctx.fillStyle=colorFn(grid[gy][gx]);
        ctx.fillRect(x+gx*cellSz, y+gy*cellSz, cellSz+0.5, cellSz+0.5);
      }
    }
    ctx.strokeStyle='#ccc';
    ctx.lineWidth=1.5;
    ctx.strokeRect(x,y,sz,sz);
    ctx.restore();
  }

  // Draw interpolated grid (noise -> precip)
  function drawDenoisingGrid(x,y,sz,t,noiseG,targetG,colorFn){
    var cellSz=sz/G;
    for(var gy=0;gy<G;gy++){
      for(var gx=0;gx<G;gx++){
        var nv=noiseG[gy][gx];
        var tv=targetG[gy][gx];
        var v=lerp(nv,tv,t);
        ctx.fillStyle=colorFn(v);
        ctx.fillRect(x+gx*cellSz, y+gy*cellSz, cellSz+0.5, cellSz+0.5);
      }
    }
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5;
    ctx.strokeRect(x,y,sz,sz);
  }

  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=lw||2.25;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    var asz=10.5;
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-asz*Math.cos(ang-0.35),y2-asz*Math.sin(ang-0.35));
    ctx.lineTo(x2-asz*Math.cos(ang+0.35),y2-asz*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  // Phase timing (identical to original)
  var P={
    A:0, A_end:1.5,
    B:1.2, B_end:2.5,
    C:2.3, C_end:7.0,
    D:7.0, D_end:9.5,
    E:9.0, E_end:11.0,
    FADE_START:12.5,
    FADE_END:14.0,
    TOTAL:14.5
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  // ── Layout constants ──
  // Vertical center line for the flow (Y midpoint)
  var flowY=320;

  // Input images: 100px (was 80px)
  var inputSz=100;
  // Input panel left edge
  var inputX=20;
  // MW center Y, IR center Y (stacked vertically, centered on flowY)
  var mwTopY=flowY-inputSz-35;
  var irTopY=flowY+35;

  // Model block: 180x100
  var modelW=180, modelH=100;
  var modelX=155, modelY=flowY-modelH/2;

  // Diffusion panel
  var diffX=355, diffW=215;
  var mainDenSz=120;

  // Ensemble panel
  var ensX=585, ensW=185;
  var memSz=60, memGap=8;

  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 30px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('DifERS: Diffusion Ensemble Rainfall from Satellite', W/2, 42, '#1a1a1a');
    ctx.globalAlpha=1; ctx.restore();
  }

  function drawInputs(t){
    var a=ease(clamp01((t-P.A)/0.8));
    if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a;

    // MW panel label (20px, no sub-label)
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    var mwCX=inputX+inputSz/2;
    haloText('MW Radiances', mwCX, mwTopY-12, ORANGE);

    // Stack of MW grids (3 offset)
    for(var s=2;s>=0;s--){
      var sa=ease(clamp01((a-(2-s)*0.1)/0.8));
      ctx.globalAlpha=sa*(s===0?1:0.5);
      drawGrid(inputX+s*5, mwTopY+s*5, inputSz-10, mwGrid, mwColor, sa);
    }
    ctx.globalAlpha=a;

    // IR panel label (20px, no sub-label)
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    var irCX=inputX+inputSz/2;
    haloText('IR Time Series', irCX, irTopY-12, BLUE);

    // Stack of IR grids
    for(var s=2;s>=0;s--){
      var sa2=ease(clamp01((a-(2-s)*0.1-0.2)/0.8));
      ctx.globalAlpha=sa2*(s===0?1:0.5);
      drawGrid(inputX+s*5, irTopY+s*5, inputSz-10, irGrid, irColor, sa2);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function drawModelBlock(t){
    var a=ease(clamp01((t-P.B)/0.6));
    if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a;

    // Arrows from inputs to model
    var mwBottom=mwTopY+inputSz;
    var irTop=irTopY;
    drawArrow(inputX+inputSz+5, mwTopY+inputSz/2, modelX-5, modelY+modelH*0.35, '#bbb');
    drawArrow(inputX+inputSz+5, irTopY+inputSz/2, modelX-5, modelY+modelH*0.65, '#bbb');

    // Model container
    ctx.fillStyle='#f0ecf5'; ctx.strokeStyle=PURPLE; ctx.lineWidth=3;
    ctx.beginPath(); ctx.roundRect(modelX,modelY,modelW,modelH,10); ctx.fill(); ctx.stroke();

    // "DifERS" label (24px bold)
    ctx.font='700 24px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('DifERS', modelX+modelW/2, modelY+42, PURPLE);

    // "Conditional Diffusion" label (18px)
    ctx.font='italic 18px "Noto Sans",sans-serif';
    haloText('Conditional Diffusion', modelX+modelW/2, modelY+72, '#888');

    ctx.globalAlpha=1; ctx.restore();
  }

  function drawDiffusion(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.5));
    ctx.save(); ctx.globalAlpha=a;

    // Arrow from model to diffusion
    drawArrow(modelX+modelW+5, flowY, diffX-5, flowY, '#bbb');

    // Diffusion process area
    var dy=65, dh=520;
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(diffX,dy,diffW,dh,10); ctx.fill(); ctx.stroke();

    // "Iterative Denoising" label (24px)
    ctx.font='600 24px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Iterative Denoising', diffX+diffW/2, dy+32, '#555');

    // Show denoising progress
    var denoise=clamp01((t-P.C-0.3)/(P.C_end-P.C-0.3));
    var imgX=diffX+(diffW-mainDenSz)/2, imgY=dy+50;

    // Main denoising grid (130px)
    drawDenoisingGrid(imgX, imgY, mainDenSz, ease(denoise), noiseGrid, precipPattern, function(v){
      if(denoise<0.3) return noiseColor(v);
      var precipV=lerp(0, v, clamp01((denoise-0.1)/0.9));
      return precipColor(precipV);
    });

    // Step counter (22px)
    var step=Math.round(lerp(1000,0,denoise));
    ctx.font='600 22px "Google Sans","Noto Sans",sans-serif';
    haloText('k = '+step, diffX+diffW/2, imgY+mainDenSz+28, PURPLE);

    // Progress bar
    var barX=imgX, barY=imgY+mainDenSz+40, barW=mainDenSz, barH=8;
    ctx.fillStyle='#e8e0f0';
    ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,4); ctx.fill();
    ctx.fillStyle=PURPLE;
    ctx.beginPath(); ctx.roundRect(barX,barY,barW*denoise,barH,4); ctx.fill();

    // 4 intermediate snapshots (14px labels removed per instruction - just show grids)
    var snapTimes=[0.0, 0.33, 0.66, 1.0];
    var snapSz=44;
    var snapY=barY+22;
    var snapPad=14;
    var snapTotalW=4*snapSz;
    var snapGapCalc=(diffW-2*snapPad-snapTotalW)/3;
    var snapStartX=diffX+snapPad;

    for(var s=0;s<4;s++){
      var st=snapTimes[s];
      var sa=clamp01((denoise-st+0.1)/0.15);
      if(sa<=0) continue;
      ctx.globalAlpha=a*ease(sa);
      var sx=snapStartX+s*(snapSz+snapGapCalc);

      drawDenoisingGrid(sx, snapY, snapSz, st, noiseGrid, precipPattern, function(v){
        if(st<0.3) return noiseColor(v);
        return precipColor(lerp(0,v,clamp01((st-0.1)/0.9)));
      });
    }

    // "x 128 samples" label (20px)
    if(denoise>0.9){
      var ra=ease(clamp01((denoise-0.9)/0.1));
      ctx.globalAlpha=a*ra;
      ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
      haloText('\u00d7 128 samples', diffX+diffW/2, snapY+snapSz+28, PURPLE);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function drawEnsemble(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.5));
    ctx.save(); ctx.globalAlpha=a;

    // Arrow from diffusion to ensemble
    drawArrow(diffX+diffW+5, flowY, ensX-5, flowY, '#bbb');

    // Ensemble container
    var ey=65, eh=520;
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(ensX,ey,ensW,eh,10); ctx.fill(); ctx.stroke();

    // "Ensemble Output" label (24px) - split into two lines to fit width
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Ensemble Output', ensX+ensW/2, ey+28, '#555');

    // Show 6 ensemble members in 2x3 grid (60px each)
    var memStartX=ensX+(ensW-2*memSz-memGap)/2;
    var memStartY=ey+46;

    for(var e=0;e<N_ENS;e++){
      var row=Math.floor(e/2), col=e%2;
      var delay=e*0.12;
      var ea=ease(clamp01(((t-P.D-0.3)-delay)/0.4));
      if(ea<=0) continue;
      ctx.globalAlpha=a*ea;

      var mx=memStartX+col*(memSz+memGap);
      var my=memStartY+row*(memSz+memGap);

      var cellSz=memSz/G;
      for(var gy=0;gy<G;gy++){
        for(var gx=0;gx<G;gx++){
          var v=Math.max(0,Math.min(1, precipPattern[gy][gx]+ensNoise[e][gy][gx]));
          ctx.fillStyle=precipColor(v);
          ctx.fillRect(mx+gx*cellSz, my+gy*cellSz, cellSz+0.5, cellSz+0.5);
        }
      }
      ctx.strokeStyle='#ddd'; ctx.lineWidth=1;
      ctx.strokeRect(mx,my,memSz,memSz);
    }

    // Ensemble mean and uncertainty (phase E)
    if(t>=P.E){
      var ea2=ease(clamp01((t-P.E)/0.8));
      ctx.globalAlpha=a*ea2;

      var bottomY=memStartY+3*(memSz+memGap)+18;

      // Ens. Mean label (18px)
      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      haloText('Mean', memStartX+memSz/3, bottomY-6, GREEN);
      drawGrid(memStartX, bottomY, memSz, precipPattern, precipColor, ea2);

      // Uncertainty label (18px)
      haloText('Uncertainty', memStartX+memSz+memGap+memSz/2, bottomY-6, '#B85450');

      // Generate uncertainty grid
      var cellSz2=memSz/G;
      for(var gy=0;gy<G;gy++){
        for(var gx=0;gx<G;gx++){
          var v=precipPattern[gy][gx];
          var unc=0;
          if(gy>0&&gy<G-1&&gx>0&&gx<G-1){
            var grad=Math.abs(precipPattern[gy][gx]-precipPattern[gy-1][gx])
                    +Math.abs(precipPattern[gy][gx]-precipPattern[gy][gx-1]);
            unc=Math.min(1, grad*2+v*0.2);
          }
          ctx.fillStyle=uncertColor(unc);
          ctx.fillRect(memStartX+memSz+memGap+gx*cellSz2,
                       bottomY+gy*cellSz2, cellSz2+0.5, cellSz2+0.5);
        }
      }
      ctx.strokeStyle='#ddd'; ctx.lineWidth=1;
      ctx.strokeRect(memStartX+memSz+memGap, bottomY, memSz, memSz);

      // CC label (18px)
      if(ea2>0.5){
        var la=ease(clamp01((ea2-0.5)/0.5));
        ctx.globalAlpha=a*la;
        ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
        haloText('CC = 0.82', ensX+ensW/2, bottomY+memSz+22, GREEN);
      }
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    // Global fade: smooth in at start, smooth out before loop
    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawInputs(t);
    drawModelBlock(t);
    drawDiffusion(t);
    drawEnsemble(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
