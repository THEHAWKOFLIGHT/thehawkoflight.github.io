<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EventFlow Animation</title>
<style>
  body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  canvas { display: block; margin: 0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W = 780, H = 640, dpr = window.devicePixelRatio || 1;
  var canvas = document.getElementById('c');
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // roundRect polyfill for older browsers
  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      if(typeof r === 'number') r = [r,r,r,r];
      var tl=r[0]||0;
      this.moveTo(x+tl,y);
      this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl);
      this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl);
      this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl);
      this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl);
      this.closePath();
    };
  }

  // Colors
  var BLUE = '#6C8EBF', ORANGE = '#D79B00', GREEN = '#82B366', PURPLE = '#9673A6';
  var BG = '#fdfdfe';

  // Timeline geometry
  var TL = { x: 80, y: 110, w: 620, split: 0.55 }; // split = fraction that is history
  var TL_END = TL.x + TL.w;
  var TL_SPLIT = TL.x + TL.w * TL.split;
  var DOT_R = 8; // was 5

  // History events (times as fraction of history region 0-1)
  var histTimes = [0.05, 0.15, 0.22, 0.38, 0.45, 0.52, 0.68, 0.75, 0.88, 0.95];
  var histX = histTimes.map(function(t){ return TL.x + t * TL.w * TL.split; });
  // Y jitter for event marks on timeline
  var histMarkY = histTimes.map(function(){ return -12 - Math.random() * 25; });

  // Predicted events (times as fraction of prediction region 0-1)
  var predTimes = [0.15, 0.35, 0.55, 0.72, 0.9];
  var predX = predTimes.map(function(t){ return TL_SPLIT + t * (TL_END - TL_SPLIT); });
  var predMarkY = predTimes.map(function(){ return -12 - Math.random() * 25; });
  var N_PRED = predTimes.length;

  // Flow plot geometry
  var FP = { x: 160, y: 280, w: 460, h: 280 };

  // Target positions (at s=1, mapped to predicted event times)
  // targY decreases as i increases (higher predTime = higher on screen)
  var targY = predTimes.map(function(t){ return FP.y + FP.h - t * (FP.h - 40) - 20; });

  // Random initial positions — sorted to match targY order so paths don't cross
  var initYraw = [];
  for(var i = 0; i < N_PRED; i++) initYraw.push(FP.y + 30 + Math.random() * (FP.h - 60));
  initYraw.sort(function(a, b){ return b - a; }); // descending (matching targY order)
  // Add some jitter while preserving order
  var initY = initYraw;

  // Generate non-crossing flow paths (monotone interpolation)
  function flowPath(i, s){
    var y0 = initY[i], y1 = targY[i];
    // Smooth cubic ease between start and end — no cross-over curvature
    var ss = s * s * (3 - 2 * s); // smoothstep
    return y0 + (y1 - y0) * ss;
  }

  // Text with halo for readability
  function haloText(text, x, y, fill, haloPx){
    var hp = haloPx || 5; // was 3
    ctx.save();
    ctx.strokeStyle = BG;
    ctx.lineWidth = hp * 2;
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    ctx.strokeText(text, x, y);
    ctx.fillStyle = fill;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  // Easing
  function ease(t){ return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }
  function clamp01(t){ return t < 0 ? 0 : t > 1 ? 1 : t; }
  function lerp(a,b,t){ return a + (b-a)*t; }

  // Color interpolation (hex to rgb)
  function hexRgb(h){
    var v = parseInt(h.slice(1),16);
    return [(v>>16)&255, (v>>8)&255, v&255];
  }
  function blendHex(c1, c2, t){
    var a = hexRgb(c1), b = hexRgb(c2);
    var r = Math.round(a[0]+(b[0]-a[0])*t);
    var g = Math.round(a[1]+(b[1]-a[1])*t);
    var bl = Math.round(a[2]+(b[2]-a[2])*t);
    return 'rgb('+r+','+g+','+bl+')';
  }

  // Phase timing (seconds)
  var P = {
    A_start: 0,    A_end: 2.5,    // Timeline + history events appear
    B_start: 2.5,  B_end: 4.2,    // Prediction horizon highlights
    C_start: 4.2,  C_end: 6.0,    // Count prediction + flow plot axes
    D_start: 6.0,  D_end: 7.5,    // Random dots appear at s=0
    E_start: 7.5,  E_end: 11.5,   // Flow: dots travel s=0 to s=1
    F_start: 11.5, F_end: 14.0,   // Final dots appear on timeline
    TOTAL: 17.0                     // 3s pause then loop
  };

  var startTime = null;
  function getT(){ return ((performance.now() / 1000) - startTime) % P.TOTAL; }

  function drawTimeline(t){
    var ap = clamp01((t - P.A_start) / 1.0); // line draws in first 1s
    if(ap <= 0) return;

    ctx.save();
    // Main line
    var endX = TL.x + TL.w * ease(ap);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 3; // was 2
    ctx.beginPath();
    ctx.moveTo(TL.x, TL.y);
    ctx.lineTo(endX, TL.y);
    ctx.stroke();

    // Arrow at end (scaled up 50%)
    if(ap > 0.95){
      ctx.beginPath();
      ctx.moveTo(TL_END + 12, TL.y);
      ctx.lineTo(TL_END - 3, TL.y - 7.5);
      ctx.lineTo(TL_END - 3, TL.y + 7.5);
      ctx.closePath();
      ctx.fillStyle = '#888';
      ctx.fill();
    }

    // "time" label — 22px (was 14px)
    if(ap > 0.8){
      var la = clamp01((ap - 0.8) / 0.2);
      ctx.globalAlpha = la;
      ctx.font = 'italic 22px "Noto Sans", sans-serif';
      ctx.textAlign = 'center';
      haloText('time', TL.x + TL.w / 2, TL.y + 36, '#888');
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  function drawHistoryEvents(t){
    var base = P.A_start + 0.8;
    var dur = P.A_end - base;
    ctx.save();
    for(var i = 0; i < histX.length; i++){
      var delay = i / histX.length * 0.6;
      var ap = clamp01((t - base - delay) / 0.4);
      if(ap <= 0) continue;

      var ea = ease(ap);
      var x = histX[i];
      var my = histMarkY[i];

      // Vertical tick
      ctx.strokeStyle = BLUE;
      ctx.lineWidth = 3; // was 2
      ctx.globalAlpha = ea;
      ctx.beginPath();
      ctx.moveTo(x, TL.y);
      ctx.lineTo(x, TL.y + my * ea);
      ctx.stroke();

      // Dot at top — radius 8 (was 5, via DOT_R)
      ctx.beginPath();
      ctx.arc(x, TL.y + my * ea, DOT_R * ea, 0, Math.PI * 2);
      ctx.fillStyle = BLUE;
      ctx.fill();
    }

    // "History" label — 26px (was 16px)
    var labAp = clamp01((t - P.A_end + 0.3) / 0.4);
    if(labAp > 0){
      ctx.globalAlpha = ease(labAp);
      ctx.font = '600 26px "Google Sans", "Noto Sans", sans-serif';
      ctx.textAlign = 'center';
      haloText('History', TL.x + TL.w * TL.split / 2, TL.y + 55, BLUE);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawPredictionHorizon(t){
    var ap = clamp01((t - P.B_start) / 0.8);
    if(ap <= 0) return;

    ctx.save();
    var ea = ease(ap);

    // Shaded region
    ctx.globalAlpha = 0.12 * ea;
    ctx.fillStyle = GREEN;
    ctx.fillRect(TL_SPLIT, TL.y - 50, (TL_END - TL_SPLIT) * ea, 85);
    ctx.globalAlpha = 1;

    // Dashed separator line
    ctx.globalAlpha = ea;
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 2; // was 1.5
    ctx.beginPath();
    ctx.moveTo(TL_SPLIT, TL.y - 50);
    ctx.lineTo(TL_SPLIT, TL.y + 35);
    ctx.stroke();
    ctx.setLineDash([]);

    // "Prediction Horizon" label — 26px (was 16px)
    var labAp = clamp01((t - P.B_start - 0.4) / 0.5);
    if(labAp > 0){
      ctx.globalAlpha = ease(labAp);
      ctx.font = '600 26px "Google Sans", "Noto Sans", sans-serif';
      ctx.textAlign = 'center';
      haloText('Prediction Horizon', (TL_SPLIT + TL_END) / 2, TL.y + 55, GREEN);
    }

    // "?" marks for unknown events — 36px (was 24px)
    var qAp = clamp01((t - P.B_start - 0.6) / 0.5);
    if(qAp > 0 && t < P.F_start){
      ctx.globalAlpha = 0.3 * ease(qAp);
      ctx.font = '36px "Noto Sans", sans-serif';
      ctx.textAlign = 'center';
      haloText('? ? ?', (TL_SPLIT + TL_END) / 2, TL.y - 18, '#999');
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawCountPrediction(t){
    var ap = clamp01((t - P.C_start) / 0.8);
    if(ap <= 0) return;

    ctx.save();
    var ea = ease(ap);
    ctx.globalAlpha = ea;

    // Arrow from history to count — line width 2.5px (was 1.5px)
    var ax1 = TL_SPLIT - 20, ay1 = TL.y + 65;
    var ax2 = 230, ay2 = TL.y + 110;
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 2.5; // was 1.5
    ctx.beginPath();
    ctx.moveTo(ax1, ay1);
    ctx.quadraticCurveTo(ax1 - 30, ay2, ax2, ay2);
    ctx.stroke();
    // arrowhead (scaled up 50%)
    ctx.beginPath();
    ctx.moveTo(ax2, ay2);
    ctx.lineTo(ax2 - 9, ay2 - 6);
    ctx.lineTo(ax2 - 9, ay2 + 6);
    ctx.closePath();
    ctx.fillStyle = '#aaa';
    ctx.fill();

    // Count box — enlarged proportionally for 24px text
    var bx = 230, by = TL.y + 93;
    ctx.fillStyle = '#f0f4f8';
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 2; // was 1
    ctx.beginPath();
    ctx.roundRect(bx, by, 180, 40, 7);
    ctx.fill();
    ctx.stroke();

    // Box text — 24px (was 15px)
    ctx.font = '600 24px "Google Sans", "Noto Sans", sans-serif';
    ctx.textAlign = 'center';
    haloText('Predict n = ' + N_PRED, bx + 90, by + 29, '#444');

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawFlowAxes(t){
    var ap = clamp01((t - P.C_start - 0.3) / 0.8);
    if(ap <= 0) return;

    ctx.save();
    var ea = ease(ap);
    ctx.globalAlpha = ea;

    // Box background — border 2px (was 1px)
    ctx.fillStyle = '#fafbfd';
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2; // was 1
    ctx.beginPath();
    ctx.roundRect(FP.x - 10, FP.y - 10, FP.w + 30, FP.h + 30, 8);
    ctx.fill();
    ctx.stroke();

    // Y axis (event time)
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2; // was 1.5
    ctx.beginPath();
    ctx.moveTo(FP.x, FP.y + FP.h);
    ctx.lineTo(FP.x, FP.y);
    ctx.stroke();
    // arrow (scaled up 50%)
    ctx.beginPath();
    ctx.moveTo(FP.x, FP.y - 9);
    ctx.lineTo(FP.x - 6, FP.y + 3);
    ctx.lineTo(FP.x + 6, FP.y + 3);
    ctx.closePath();
    ctx.fillStyle = '#888';
    ctx.fill();

    // X axis (flow time s)
    ctx.beginPath();
    ctx.moveTo(FP.x, FP.y + FP.h);
    ctx.lineTo(FP.x + FP.w, FP.y + FP.h);
    ctx.stroke();
    // arrow (scaled up 50%)
    ctx.beginPath();
    ctx.moveTo(FP.x + FP.w + 9, FP.y + FP.h);
    ctx.lineTo(FP.x + FP.w - 3, FP.y + FP.h - 6);
    ctx.lineTo(FP.x + FP.w - 3, FP.y + FP.h + 6);
    ctx.closePath();
    ctx.fill();

    // Labels — 22px (was 13px)
    ctx.font = 'italic 22px "Noto Sans", sans-serif';
    ctx.textAlign = 'center';
    haloText('flow time s', FP.x + FP.w / 2, FP.y + FP.h + 32, '#888');

    ctx.save();
    ctx.translate(FP.x - 50, FP.y + FP.h / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.font = 'italic 22px "Noto Sans", sans-serif';
    ctx.textAlign = 'center';
    haloText('event time', 0, 0, '#888');
    ctx.restore();

    // s=0 and s=1 marks — 20px (was 12px)
    ctx.font = '20px "Noto Sans", sans-serif';
    ctx.textAlign = 'center';
    haloText('s=0', FP.x, FP.y + FP.h + 22, '#aaa');
    haloText('s=1', FP.x + FP.w, FP.y + FP.h + 22, '#aaa');

    // Title — 24px bold (was 15px)
    ctx.font = '700 24px "Google Sans", "Noto Sans", sans-serif';
    ctx.textAlign = 'center';
    haloText('Flow Matching', FP.x + FP.w / 2, FP.y - 22, '#555');

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawRandomDots(t){
    var ap = clamp01((t - P.D_start) / 0.6);
    if(ap <= 0) return;

    ctx.save();
    for(var i = 0; i < N_PRED; i++){
      var delay = i * 0.08;
      var da = clamp01((ap - delay) / 0.3);
      if(da <= 0) continue;
      var ea = ease(da);

      ctx.globalAlpha = ea;
      ctx.beginPath();
      ctx.arc(FP.x + 2, initY[i], 10 * ea, 0, Math.PI * 2); // radius 10 (was 6)
      ctx.fillStyle = ORANGE;
      ctx.fill();
    }

    // Label — 20px (was 12px), positioned to avoid overlap with dots
    var labAp = clamp01((t - P.D_start - 0.3) / 0.4);
    if(labAp > 0){
      ctx.globalAlpha = ease(labAp);
      ctx.font = '600 20px "Google Sans", "Noto Sans", sans-serif';
      ctx.textAlign = 'left';
      haloText('random init (s=0)', FP.x + 16, FP.y + 20, ORANGE);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawFlow(t){
    if(t < P.E_start) return;
    var ap = clamp01((t - P.E_start) / (P.E_end - P.E_start));
    var s = ease(ap); // flow time progress

    ctx.save();
    for(var i = 0; i < N_PRED; i++){
      var x0 = FP.x + 2;
      var x1 = FP.x + FP.w - 2;

      // Draw trail — line width 3 (was 2)
      ctx.beginPath();
      ctx.moveTo(x0, initY[i]);
      var steps = Math.floor(s * 40);
      for(var j = 1; j <= steps; j++){
        var sj = j / 40;
        var xj = lerp(x0, x1, sj);
        var yj = flowPath(i, sj);
        ctx.lineTo(xj, yj);
      }
      // current pos
      var curX = lerp(x0, x1, s);
      var curY = flowPath(i, s);
      ctx.lineTo(curX, curY);
      ctx.strokeStyle = blendHex(ORANGE, GREEN, s);
      ctx.lineWidth = 3; // was 2
      ctx.globalAlpha = 0.5;
      ctx.stroke();

      // Current dot — radius 10 (was 6)
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(curX, curY, 10, 0, Math.PI * 2);
      ctx.fillStyle = blendHex(ORANGE, GREEN, s);
      ctx.fill();

      // Velocity arrow (small) — arrowhead scaled up 50%
      if(s > 0.02 && s < 0.98){
        var ds = 0.02;
        var nextY = flowPath(i, Math.min(s + ds, 1));
        var dx = (x1 - x0) * ds;
        var dy = nextY - curY;
        var mag = Math.sqrt(dx*dx + dy*dy);
        if(mag > 0){
          var nx = dx / mag * 18;
          var ny = dy / mag * 18;
          ctx.strokeStyle = blendHex(ORANGE, GREEN, s);
          ctx.lineWidth = 2; // was 1.5
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.moveTo(curX, curY);
          ctx.lineTo(curX + nx, curY + ny);
          ctx.stroke();
          // small arrowhead (scaled up 50%: 5 -> 7.5)
          var ang = Math.atan2(ny, nx);
          ctx.beginPath();
          ctx.moveTo(curX + nx, curY + ny);
          ctx.lineTo(curX + nx - 7.5*Math.cos(ang - 0.5), curY + ny - 7.5*Math.sin(ang - 0.5));
          ctx.lineTo(curX + nx - 7.5*Math.cos(ang + 0.5), curY + ny - 7.5*Math.sin(ang + 0.5));
          ctx.closePath();
          ctx.fillStyle = blendHex(ORANGE, GREEN, s);
          ctx.globalAlpha = 0.6;
          ctx.fill();
        }
      }
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawFinalPredictions(t){
    var ap = clamp01((t - P.F_start) / 1.0);
    if(ap <= 0) return;

    ctx.save();
    // Hide the "? ? ?" by this point (handled in drawPredictionHorizon)

    for(var i = 0; i < N_PRED; i++){
      var delay = i * 0.1;
      var da = clamp01((ap - delay) / 0.3);
      if(da <= 0) continue;
      var ea = ease(da);

      var x = predX[i];
      var my = predMarkY[i];

      // Vertical tick — line width 3 (was 2)
      ctx.strokeStyle = GREEN;
      ctx.lineWidth = 3;
      ctx.globalAlpha = ea;
      ctx.beginPath();
      ctx.moveTo(x, TL.y);
      ctx.lineTo(x, TL.y + my * ea);
      ctx.stroke();

      // Dot — radius 8 (was 5, via DOT_R)
      ctx.beginPath();
      ctx.arc(x, TL.y + my * ea, DOT_R * ea, 0, Math.PI * 2);
      ctx.fillStyle = GREEN;
      ctx.fill();
    }

    // "Predicted Events" label — 22px (was 14px)
    var labAp = clamp01((ap - 0.5) / 0.4);
    if(labAp > 0){
      ctx.globalAlpha = ease(labAp);
      ctx.font = '600 22px "Google Sans", "Noto Sans", sans-serif';
      ctx.textAlign = 'center';
      haloText('Predicted Events', (TL_SPLIT + TL_END) / 2, TL.y - 58, GREEN);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawLegend(t){
    if(t < 2) return;
    var ap = clamp01((t - 2) / 0.5);
    ctx.save();
    ctx.globalAlpha = ease(ap);

    var lx = 570, ly = 185;
    // Legend text — 20px (was 12px), dots radius 7 (was 4)
    ctx.font = '20px "Noto Sans", sans-serif';
    ctx.textAlign = 'left';

    // History
    ctx.beginPath();
    ctx.arc(lx, ly, 7, 0, Math.PI * 2);
    ctx.fillStyle = BLUE;
    ctx.fill();
    ctx.font = '20px "Noto Sans", sans-serif';
    ctx.textAlign = 'left';
    haloText('History', lx + 14, ly + 7, '#666');

    // Predicted (only after F)
    if(t > P.F_start + 0.5){
      var pa = clamp01((t - P.F_start - 0.5) / 0.4);
      ctx.globalAlpha = ease(pa);
      ly += 28; // increased spacing for larger text
      ctx.beginPath();
      ctx.arc(lx, ly, 7, 0, Math.PI * 2);
      ctx.fillStyle = GREEN;
      ctx.fill();
      ctx.font = '20px "Noto Sans", sans-serif';
      ctx.textAlign = 'left';
      haloText('Predicted', lx + 14, ly + 7, '#666');
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawTitle(t){
    var ap = clamp01(t / 0.6);
    ctx.save();
    ctx.globalAlpha = ease(ap);
    // Title — 30px bold (was 20px). Subtitle removed entirely.
    ctx.font = '700 30px "Google Sans", "Noto Sans", sans-serif';
    ctx.textAlign = 'center';
    haloText('EventFlow: Forecasting with Flow Matching', W / 2, 44, '#1a1a1a');
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function frame(){
    if(startTime === null) startTime = performance.now() / 1000;
    var t = getT();

    // Clear
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    drawTitle(t);
    drawTimeline(t);
    drawHistoryEvents(t);
    drawPredictionHorizon(t);
    drawCountPrediction(t);
    drawFlowAxes(t);
    drawRandomDots(t);
    drawFlow(t);
    drawFinalPredictions(t);
    drawLegend(t);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
