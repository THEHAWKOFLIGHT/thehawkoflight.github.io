<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Classifier Comparison Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var BLUE='#6C8EBF', ORANGE='#D79B00', GREEN='#82B366', PURPLE='#9673A6';
  var RED='#B85450', BG='#fdfdfe';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function haloText(text,x,y,fill,hp){
    hp=hp||3; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  // ---- Physics-based NaI gamma-ray spectrum ----
  var SPEC_N=512;
  var E_MAX=3000; // keV
  var spectrum=[];
  for(var i=0;i<SPEC_N;i++) spectrum[i]=0;

  // NaI resolution: FWHM(E) ≈ k * sqrt(E), k ≈ 1.8 for NaI(Tl)
  function naiSigma(E_keV){ return 1.8*Math.sqrt(Math.max(E_keV,10))/2.355; }

  // Add a Gaussian peak at energy E (keV) with given amplitude
  function addGaussian(arr, E_keV, amp){
    var sig=naiSigma(E_keV);
    for(var i=0;i<SPEC_N;i++){
      var e=i*E_MAX/SPEC_N;
      var d=(e-E_keV)/sig;
      arr[i]+=amp*Math.exp(-0.5*d*d);
    }
  }

  // Compton edge energy for incident gamma E
  function comptonEdge(E){ return E*(2*E/511)/(1+2*E/511); }
  // Backscatter peak energy
  function backscatterE(E){ return E/(1+2*E/511); }

  // Add Compton continuum: flat shelf from 0 to Compton edge with rolloff
  function addCompton(arr, E_keV, amp){
    var Ece=comptonEdge(E_keV);
    var edgeCh=Math.round(Ece/E_MAX*SPEC_N);
    // Klein-Nishina-like shape: slight rise toward edge
    for(var i=0;i<SPEC_N;i++){
      var e=i*E_MAX/SPEC_N;
      if(e>Ece+40) continue;
      // Differential cross section shape (simplified)
      var s=e/E_keV;
      var kn=1; // flat approximation
      if(s>0 && s<1){
        // rough Klein-Nishina: rises gently toward edge
        var r=1+s*s/((1-s)*(1+2*E_keV*(1-s)/511));
        kn=Math.min(r, 3);
      }
      // Smooth cutoff at Compton edge (NaI broadening)
      var edgeFalloff=1-clamp01((e-Ece)/(naiSigma(Ece)*1.5));
      arr[i]+=amp*0.18*kn*edgeFalloff;
    }
  }

  // Source definitions: {E: energy keV, amp: relative intensity, label: name}
  var sources=[
    // Cs-137
    {E:662, amp:1.0, label:'Cs-137'},
    // Co-60
    {E:1173, amp:0.55, label:'Co-60'},
    {E:1332, amp:0.50, label:'Co-60'},
    // K-40
    {E:1461, amp:0.20, label:'K-40'},
    // Am-241 (low energy)
    {E:59.5, amp:0.45, label:'Am-241'},
    // Ba-133
    {E:356, amp:0.35, label:'Ba-133'},
    {E:81, amp:0.30, label:'Ba-133'},
    // Na-22
    {E:511, amp:0.25, label:'Na-22'},
    {E:1275, amp:0.18, label:'Na-22'},
    // Eu-152
    {E:122, amp:0.28, label:'Eu-152'},
    {E:344, amp:0.22, label:'Eu-152'}
  ];

  // Build spectrum: for each source add photopeak + Compton + backscatter
  for(var s=0;s<sources.length;s++){
    var src=sources[s];
    // Photopeak
    addGaussian(spectrum, src.E, src.amp);
    // Compton continuum
    addCompton(spectrum, src.E, src.amp);
    // Backscatter peak (small, broad Gaussian near backscatter energy)
    if(src.E>100){
      var bsE=backscatterE(src.E);
      addGaussian(spectrum, bsE, src.amp*0.08);
    }
  }

  // Environmental background: exponential + constant
  for(var i=0;i<SPEC_N;i++){
    var e=i*E_MAX/SPEC_N;
    spectrum[i]+=0.08*Math.exp(-e/300)+0.015;
  }

  // Lead X-ray fluorescence peaks (from shielding)
  addGaussian(spectrum, 75, 0.18);
  addGaussian(spectrum, 85, 0.10);

  // Iodine escape peak for Cs-137 (662 - 28.6 keV)
  addGaussian(spectrum, 633, 0.06);

  // Normalize to max ≈ 0.92 so it fits the plot nicely
  var specMax=0;
  for(var i=0;i<SPEC_N;i++) if(spectrum[i]>specMax) specMax=spectrum[i];
  for(var i=0;i<SPEC_N;i++) spectrum[i]=spectrum[i]/specMax*0.92;

  // Poisson-like noise (proportional to sqrt of counts)
  var specNoise=[];
  for(var i=0;i<SPEC_N;i++){
    specNoise[i]=(Math.random()-0.5)*0.02*Math.sqrt(Math.max(spectrum[i],0.02)/0.5);
  }

  // ---- Extracted features (identified photopeaks for BARNI) ----
  // Label only well-separated prominent peaks to avoid text overlap
  var features=[
    {E:59.5,  label:'Am-241', yOff:0},
    {E:356,   label:'Ba-133', yOff:0},
    {E:662,   label:'Cs-137', yOff:0},
    {E:1173,  label:'Co-60',  yOff:0},
    {E:1461,  label:'K-40',   yOff:0}
  ];
  // Compute feature positions & amplitudes in normalized coords
  for(var f=0;f<features.length;f++){
    features[f].pos=features[f].E/E_MAX;
    var ch=Math.round(features[f].E/E_MAX*SPEC_N);
    ch=Math.max(0,Math.min(SPEC_N-1,ch));
    features[f].amp=spectrum[ch];
  }

  // ---- Classifier results ----
  var classifiers=[
    {name:'XGBoost', f1:0.910, color:GREEN, time:'5.97s'},
    {name:'MLP', f1:0.888, color:BLUE, time:'24.63s'},
    {name:'Random Forest', f1:0.859, color:ORANGE, time:'42.28s'}
  ];

  // ---- Phase timing ----
  var P={
    A:0, A_end:2.0,         // Spectrum draws in
    B:1.8, B_end:3.5,       // Feature extraction (peaks highlighted)
    C:3.2, C_end:5.5,       // Feature vector → classifiers
    D:5.2, D_end:8.5,       // F1-score bars animate
    E:8.0, E_end:10.5,      // Winner highlight + details
    FADE_START:11.5,
    FADE_END:13.0,
    TOTAL:13.5
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  // Draw spectrum plot
  function drawSpectrum(t){
    var a=ease(clamp01((t-P.A)/1.0));
    if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a;

    var sx=40, sy=80, sw=340, sh=175;

    // Background panel
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(sx-10,sy-30,sw+20,sh+55,8);
    ctx.fill(); ctx.stroke();

    // Title
    ctx.font='600 13px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('NaI(Tl) Gamma-ray Spectrum', sx+sw/2, sy-14, '#555');

    // Axes
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(sx,sy); ctx.lineTo(sx,sy+sh); ctx.lineTo(sx+sw,sy+sh);
    ctx.stroke();

    // Tick marks on axes
    var eTicks=[0, 500, 1000, 1500, 2000, 2500, 3000];
    for(var i=0;i<eTicks.length;i++){
      var tx=sx+(eTicks[i]/E_MAX)*sw;
      ctx.beginPath(); ctx.moveTo(tx,sy+sh); ctx.lineTo(tx,sy+sh+3); ctx.stroke();
    }

    // Axis labels
    ctx.font='9px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Energy (keV)', sx+sw/2, sy+sh+18, '#aaa');
    ctx.save(); ctx.translate(sx-16, sy+sh/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';
    haloText('Counts', 0, 0, '#aaa');
    ctx.restore();

    // Energy tick labels
    ctx.font='8px "Noto Sans",sans-serif'; ctx.textAlign='center';
    for(var i=0;i<eTicks.length;i++){
      var tx=sx+(eTicks[i]/E_MAX)*sw;
      haloText(eTicks[i]+'', tx, sy+sh+10, '#bbb');
    }

    // Draw spectrum as filled area + line (progressive reveal)
    var drawN=Math.round(SPEC_N*a);

    // Filled area under curve
    ctx.beginPath();
    ctx.moveTo(sx,sy+sh);
    for(var i=0;i<drawN;i++){
      var x=sx+(i/SPEC_N)*sw;
      var v=spectrum[i]+specNoise[i]*a;
      var y=sy+sh-v*sh;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(sx+(drawN-1)/SPEC_N*sw, sy+sh);
    ctx.closePath();
    ctx.fillStyle='rgba(108,142,191,0.10)';
    ctx.fill();

    // Spectrum line
    ctx.beginPath();
    for(var i=0;i<drawN;i++){
      var x=sx+(i/SPEC_N)*sw;
      var v=spectrum[i]+specNoise[i]*a;
      var y=sy+sh-v*sh;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=BLUE; ctx.lineWidth=1.2;
    ctx.stroke();

    ctx.globalAlpha=1; ctx.restore();
  }

  // Highlight extracted peaks with isotope labels
  function drawFeatureExtraction(t){
    if(t<P.B) return;
    var a=ease(clamp01((t-P.B)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    var sx=40, sy=80, sw=340, sh=175;

    // "BARNI Feature Extraction" label
    ctx.font='600 11px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('BARNI Peak Finder', sx+sw/2, sy+sh+32, PURPLE);

    // Highlight each peak with a marker and isotope label
    for(var p=0;p<features.length;p++){
      var delay=p*0.08;
      var pa=ease(clamp01((a-delay)/0.35));
      if(pa<=0) continue;
      ctx.globalAlpha=a*pa;

      var x=sx+features[p].pos*sw;
      var y=sy+sh-features[p].amp*sh;

      // Vertical dashed line from marker to x-axis
      ctx.setLineDash([2,3]);
      ctx.strokeStyle='rgba(150,115,166,0.4)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(x,y-4); ctx.lineTo(x,sy+sh); ctx.stroke();
      ctx.setLineDash([]);

      // Circle marker on the peak
      ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
      ctx.fillStyle=PURPLE; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.2; ctx.stroke();

      // Isotope label above the marker
      ctx.font='600 8px "Google Sans","Noto Sans",sans-serif';
      // Left-align labels near the y-axis so they don't clip
      if(features[p].pos<0.05){
        ctx.textAlign='left';
        haloText(features[p].label, x-2, y-10, PURPLE, 2.5);
      } else {
        ctx.textAlign='center';
        haloText(features[p].label, x, y-10, PURPLE, 2.5);
      }
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Feature vector → classifier blocks
  function drawClassifiers(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    var sx=40, sy=80, sw=340, sh=175;

    // Arrow from spectrum to feature vector
    var arrowStartX=sx+sw+10;
    var arrowStartY=sy+sh/2;
    var fvX=410, fvY=90, fvW=24, fvH=165;

    drawArrow(arrowStartX, arrowStartY, fvX-2, arrowStartY, '#bbb');

    // Feature vector column
    ctx.fillStyle='#f0ecf5'; ctx.strokeStyle=PURPLE; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(fvX,fvY,fvW,fvH,4); ctx.fill(); ctx.stroke();

    // Feature cells
    var nCells=features.length;
    var cellH=fvH/nCells;
    for(var i=0;i<nCells;i++){
      var intensity=features[i].amp;
      var r=Math.round(lerp(240,150,intensity));
      var g=Math.round(lerp(236,115,intensity));
      var b=Math.round(lerp(245,166,intensity));
      ctx.fillStyle='rgb('+r+','+g+','+b+')';
      ctx.fillRect(fvX+2, fvY+2+i*cellH, fvW-4, cellH-2);
    }

    ctx.font='9px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Features', fvX+fvW/2, fvY-6, '#888');

    // Three classifier blocks
    var clsX=480, clsW=100, clsH=44, clsGap=12;
    var totalH=classifiers.length*(clsH+clsGap)-clsGap;
    var clsStartY=fvY+(fvH-totalH)/2;

    for(var c=0;c<classifiers.length;c++){
      var delay=c*0.15;
      var ca=ease(clamp01((a-delay)/0.5));
      if(ca<=0) continue;
      ctx.globalAlpha=a*ca;

      var cy=clsStartY+c*(clsH+clsGap);
      var cl=classifiers[c];

      // Arrow from feature vector to classifier
      drawArrow(fvX+fvW+4, fvY+fvH/2, clsX-4, cy+clsH/2, '#bbb');

      // Classifier box
      ctx.fillStyle='#fafbfd'; ctx.strokeStyle=cl.color; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(clsX,cy,clsW,clsH,6); ctx.fill(); ctx.stroke();

      // Classifier name
      ctx.font='700 12px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText(cl.name, clsX+clsW/2, cy+clsH/2+5, cl.color);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=lw||1.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-7*Math.cos(ang-0.35),y2-7*Math.sin(ang-0.35));
    ctx.lineTo(x2-7*Math.cos(ang+0.35),y2-7*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  // F1 score comparison bars
  function drawResults(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.6));
    ctx.save(); ctx.globalAlpha=a;

    // Results panel
    var rx=40, ry=325, rw=540, rh=190;
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,8); ctx.fill(); ctx.stroke();

    ctx.font='600 14px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Macro-Averaged F1 Score — 33 Radionuclides', rx+rw/2, ry+22, '#444');

    // Bar chart
    var barX=rx+140, barMaxW=340, barH=32, barGap=14;
    var barStartY=ry+45;
    var maxF1=1.0;

    for(var c=0;c<classifiers.length;c++){
      var delay=c*0.2;
      var ba=ease(clamp01(((t-P.D-0.3)-delay)/0.8));
      if(ba<=0) continue;
      ctx.globalAlpha=a*ba;

      var by=barStartY+c*(barH+barGap);
      var cl=classifiers[c];
      var barW=(cl.f1/maxF1)*barMaxW*ba;

      // Label
      ctx.font='600 12px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='right';
      haloText(cl.name, barX-10, by+barH/2+4, cl.color);

      // Bar background
      ctx.fillStyle='#eef0f4';
      ctx.beginPath(); ctx.roundRect(barX,by,barMaxW,barH,4); ctx.fill();

      // Bar fill
      ctx.fillStyle=cl.color;
      ctx.beginPath(); ctx.roundRect(barX,by,barW,barH,4); ctx.fill();

      // Score label on bar
      if(ba>0.5){
        var la=ease(clamp01((ba-0.5)/0.5));
        ctx.globalAlpha=a*la;
        ctx.font='700 13px "Google Sans","Noto Sans",sans-serif';
        ctx.textAlign='left';
        haloText(cl.f1.toFixed(3), barX+barW+8, by+barH/2+5, cl.color);
      }
    }

    // Training time comparison below bars
    var ttY=barStartY+3*(barH+barGap)+8;
    var tta=ease(clamp01((t-P.D-1.5)/0.6));
    if(tta>0){
      ctx.globalAlpha=a*tta;
      ctx.font='11px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('Training Time:', rx+80, ttY, '#888');
      for(var c=0;c<classifiers.length;c++){
        var cl=classifiers[c];
        var tx=rx+180+c*140;
        ctx.font='600 11px "Google Sans","Noto Sans",sans-serif';
        haloText(cl.name+': '+cl.time, tx, ttY, cl.color);
      }
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Winner highlight + mini confusion matrix hint
  function drawWinner(t){
    if(t<P.E) return;
    var a=ease(clamp01((t-P.E)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    // Winner panel on the right
    var wx=600, wy=325, ww=160, wh=190;
    ctx.fillStyle='#f4f9f4'; ctx.strokeStyle=GREEN; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(wx,wy,ww,wh,8); ctx.fill(); ctx.stroke();

    // Crown / star
    ctx.font='24px sans-serif'; ctx.textAlign='center';
    ctx.fillText('\u2605', wx+ww/2, wy+30);

    ctx.font='700 14px "Google Sans","Noto Sans",sans-serif';
    haloText('XGBoost', wx+ww/2, wy+50, GREEN);

    ctx.font='11px "Noto Sans",sans-serif';
    haloText('Best Overall', wx+ww/2, wy+66, '#888');

    // Key stats
    var stats=[
      {label:'Macro F1', val:'0.910'},
      {label:'Train Time', val:'5.97 s'},
      {label:'One-vs-All', val:'33 classes'}
    ];
    for(var i=0;i<stats.length;i++){
      var sy=wy+90+i*28;
      ctx.font='10px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText(stats[i].label, wx+ww/2, sy, '#999');
      ctx.font='700 13px "Google Sans","Noto Sans",sans-serif';
      haloText(stats[i].val, wx+ww/2, sy+15, '#444');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Title
  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Classifier Comparison for Radionuclide Identification', W/2, 35, '#1a1a1a');
    ctx.font='13px "Noto Sans",sans-serif';
    ctx.globalAlpha=1; ctx.restore();
  }

  // Bottom pipeline summary
  function drawPipeline(t){
    if(t<2) return;
    var a=ease(clamp01((t-2)/0.6));
    ctx.save(); ctx.globalAlpha=a*0.8;

    var by=545;
    ctx.fillStyle='#f5f6f9'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(30,by,720,55,8); ctx.fill(); ctx.stroke();

    ctx.font='11px "Noto Sans",sans-serif'; ctx.textAlign='center';
    var labels=[
      {text:'NaI Spectrum', x:100, col:BLUE},
      {text:'\u2192', x:170, col:'#bbb'},
      {text:'BARNI Features', x:250, col:PURPLE},
      {text:'\u2192', x:335, col:'#bbb'},
      {text:'RF / MLP / XGBoost', x:450, col:'#555'},
      {text:'\u2192', x:555, col:'#bbb'},
      {text:'Radionuclide ID', x:650, col:GREEN}
    ];
    for(var i=0;i<labels.length;i++){
      ctx.font=labels[i].text==='\u2192'?'16px sans-serif':'600 11px "Google Sans","Noto Sans",sans-serif';
      haloText(labels[i].text, labels[i].x, by+22, labels[i].col);
    }
    ctx.font='italic 10px "Noto Sans",sans-serif';
    haloText('One-vs-All classification  |  33 radionuclides  |  NaI scintillator detector', W/2, by+42, '#aaa');

    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    // Global fade
    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawTitle(t);
    drawSpectrum(t);
    drawFeatureExtraction(t);
    drawClassifiers(t);
    drawResults(t);
    drawWinner(t);
    drawPipeline(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
