<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Classifier Comparison Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var SILVER='#636E80', ROSE='#D4988E', SANGUINE='#E0756A', VIOLET='#7B5EC0';
  var CHARCOAL='#3A3D45', BG='#fdfcfb';

  var DARK=false;
  var COLORS_LIGHT={BG:'#fdfcfb',title:'#2a2d35',gray5:'#555',gray4:'#444',gray1:'#888',gray2:'#aaa',gray8:'#bbb',gray7:'#ccc',gray9:'#999',panelFill:'#fafaf8',panelStroke:'#ddd8d3',boxFillV:'#EBE4F8',boxFillC:'#FAEDED',barBg:'#eceae6',specFill:'rgba(99,110,128,0.10)'};
  var COLORS_DARK={BG:'#1c1d22',title:'#e0e0e4',gray5:'#aaa',gray4:'#ccc',gray1:'#777',gray2:'#666',gray8:'#555',gray7:'#444',gray9:'#777',panelFill:'#252630',panelStroke:'#3a3c48',boxFillV:'#2a2640',boxFillC:'#302028',barBg:'#2a2c34',specFill:'rgba(99,110,128,0.15)'};
  var C=COLORS_LIGHT;
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='theme'){DARK=!!e.data.dark;C=DARK?COLORS_DARK:COLORS_LIGHT;BG=C.BG;}
  });
  try{parent.postMessage({type:'viz-ready'},'*');}catch(e){}

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function haloText(text,x,y,fill,hp){
    hp=hp||5; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  // ---- Physics-based NaI gamma-ray spectrum ----
  var SPEC_N=512;
  var E_MAX=3000; // keV
  var spectrum=[];
  for(var i=0;i<SPEC_N;i++) spectrum[i]=0;

  // NaI resolution: FWHM(E) ~ k * sqrt(E), k ~ 1.8 for NaI(Tl)
  function naiSigma(E_keV){ return 1.8*Math.sqrt(Math.max(E_keV,10))/2.355; }

  // Add a Gaussian peak at energy E (keV) with given amplitude
  function addGaussian(arr, E_keV, amp){
    var sig=naiSigma(E_keV);
    for(var i=0;i<SPEC_N;i++){
      var e=i*E_MAX/SPEC_N;
      var d=(e-E_keV)/sig;
      arr[i]+=amp*Math.exp(-0.5*d*d);
    }
  }

  // Compton edge energy for incident gamma E
  function comptonEdge(E){ return E*(2*E/511)/(1+2*E/511); }
  // Backscatter peak energy
  function backscatterE(E){ return E/(1+2*E/511); }

  // Add Compton continuum: flat shelf from 0 to Compton edge with rolloff
  function addCompton(arr, E_keV, amp){
    var Ece=comptonEdge(E_keV);
    var edgeCh=Math.round(Ece/E_MAX*SPEC_N);
    for(var i=0;i<SPEC_N;i++){
      var e=i*E_MAX/SPEC_N;
      if(e>Ece+40) continue;
      var s=e/E_keV;
      var kn=1;
      if(s>0 && s<1){
        var r=1+s*s/((1-s)*(1+2*E_keV*(1-s)/511));
        kn=Math.min(r, 3);
      }
      var edgeFalloff=1-clamp01((e-Ece)/(naiSigma(Ece)*1.5));
      arr[i]+=amp*0.18*kn*edgeFalloff;
    }
  }

  // Source definitions
  var sources=[
    {E:662, amp:1.0, label:'Cs-137'},
    {E:1173, amp:0.55, label:'Co-60'},
    {E:1332, amp:0.50, label:'Co-60'},
    {E:1461, amp:0.20, label:'K-40'},
    {E:59.5, amp:0.45, label:'Am-241'},
    {E:356, amp:0.35, label:'Ba-133'},
    {E:81, amp:0.30, label:'Ba-133'},
    {E:511, amp:0.25, label:'Na-22'},
    {E:1275, amp:0.18, label:'Na-22'},
    {E:122, amp:0.28, label:'Eu-152'},
    {E:344, amp:0.22, label:'Eu-152'}
  ];

  // Build spectrum
  for(var s=0;s<sources.length;s++){
    var src=sources[s];
    addGaussian(spectrum, src.E, src.amp);
    addCompton(spectrum, src.E, src.amp);
    if(src.E>100){
      var bsE=backscatterE(src.E);
      addGaussian(spectrum, bsE, src.amp*0.08);
    }
  }

  // Environmental background
  for(var i=0;i<SPEC_N;i++){
    var e=i*E_MAX/SPEC_N;
    spectrum[i]+=0.08*Math.exp(-e/300)+0.015;
  }

  // Lead X-ray fluorescence peaks
  addGaussian(spectrum, 75, 0.18);
  addGaussian(spectrum, 85, 0.10);

  // Iodine escape peak for Cs-137
  addGaussian(spectrum, 633, 0.06);

  // Normalize
  var specMax=0;
  for(var i=0;i<SPEC_N;i++) if(spectrum[i]>specMax) specMax=spectrum[i];
  for(var i=0;i<SPEC_N;i++) spectrum[i]=spectrum[i]/specMax*0.92;

  // Poisson-like noise
  var specNoise=[];
  for(var i=0;i<SPEC_N;i++){
    specNoise[i]=(Math.random()-0.5)*0.02*Math.sqrt(Math.max(spectrum[i],0.02)/0.5);
  }

  // ---- Extracted features ----
  var features=[
    {E:59.5,  label:'Am-241', yOff:0},
    {E:356,   label:'Ba-133', yOff:0},
    {E:662,   label:'Cs-137', yOff:0},
    {E:1173,  label:'Co-60',  yOff:0},
    {E:1461,  label:'K-40',   yOff:0}
  ];
  for(var f=0;f<features.length;f++){
    features[f].pos=features[f].E/E_MAX;
    var ch=Math.round(features[f].E/E_MAX*SPEC_N);
    ch=Math.max(0,Math.min(SPEC_N-1,ch));
    features[f].amp=spectrum[ch];
  }

  // ---- Classifier results ----
  var classifiers=[
    {name:'XGBoost', f1:0.910, color:SANGUINE, time:'5.97s'},
    {name:'MLP', f1:0.888, color:SILVER, time:'24.63s'},
    {name:'Random Forest', f1:0.859, color:ROSE, time:'42.28s'}
  ];

  // ---- Shrink animation: spectrum starts big, shrinks to corner ----
  var SPEC_BIG={sx:150, sy:100, sw:480, sh:350};
  var SPEC_SMALL={sx:25, sy:85, sw:395, sh:205};
  var SHRINK_T0=2.5, SHRINK_T1=3.5;
  function getShrink(t){
    if(t<=SHRINK_T0) return 0;
    if(t>=SHRINK_T1) return 1;
    return ease((t-SHRINK_T0)/(SHRINK_T1-SHRINK_T0));
  }

  // ---- Phase timing ----
  var P={
    A:0, A_end:2.5,
    B:3.6, B_end:5.3,
    C:5.0, C_end:7.0,
    D:6.8, D_end:9.8,
    E:9.3, E_end:11.5,
    FADE_START:12.5,
    FADE_END:14.0,
    TOTAL:14.5
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  // Draw spectrum plot
  function drawSpectrum(t){
    var a=ease(clamp01((t-P.A)/1.0));
    if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a;

    var p=getShrink(t);
    var sx=lerp(SPEC_BIG.sx,SPEC_SMALL.sx,p);
    var sy=lerp(SPEC_BIG.sy,SPEC_SMALL.sy,p);
    var sw=lerp(SPEC_BIG.sw,SPEC_SMALL.sw,p);
    var sh=lerp(SPEC_BIG.sh,SPEC_SMALL.sh,p);

    // Background panel
    ctx.fillStyle=C.panelFill; ctx.strokeStyle=C.panelStroke; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(sx-12,sy-25,sw+24,sh+55,8);
    ctx.fill(); ctx.stroke();

    // Title — positioned above the panel to avoid collision with tall peak labels
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('NaI(Tl) Gamma-ray Spectrum', sx+sw/2, sy-24, C.gray5);

    // Axes
    ctx.strokeStyle=C.gray7; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(sx,sy); ctx.lineTo(sx,sy+sh); ctx.lineTo(sx+sw,sy+sh);
    ctx.stroke();

    // Tick marks - fewer ticks: 0, 1000, 2000, 3000
    var eTicks=[0, 1000, 2000, 3000];
    for(var i=0;i<eTicks.length;i++){
      var tx=sx+(eTicks[i]/E_MAX)*sw;
      ctx.beginPath(); ctx.moveTo(tx,sy+sh); ctx.lineTo(tx,sy+sh+4); ctx.stroke();
    }

    // Axis labels
    ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Energy (keV)', sx+sw/2, sy+sh+28, C.gray2);
    ctx.save(); ctx.translate(sx-22, sy+sh/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';
    haloText('Counts', 0, 0, C.gray2);
    ctx.restore();

    // Energy tick labels
    ctx.font='14px "Noto Sans",sans-serif'; ctx.textAlign='center';
    for(var i=0;i<eTicks.length;i++){
      var tx=sx+(eTicks[i]/E_MAX)*sw;
      haloText(eTicks[i]+'', tx, sy+sh+14, C.gray8);
    }

    // Draw spectrum as filled area + line (progressive reveal)
    var drawN=Math.round(SPEC_N*a);

    // Filled area under curve
    ctx.beginPath();
    ctx.moveTo(sx,sy+sh);
    for(var i=0;i<drawN;i++){
      var x=sx+(i/SPEC_N)*sw;
      var v=spectrum[i]+specNoise[i]*a;
      var y=sy+sh-v*sh;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(sx+(drawN-1)/SPEC_N*sw, sy+sh);
    ctx.closePath();
    ctx.fillStyle=C.specFill;
    ctx.fill();

    // Spectrum line
    ctx.beginPath();
    for(var i=0;i<drawN;i++){
      var x=sx+(i/SPEC_N)*sw;
      var v=spectrum[i]+specNoise[i]*a;
      var y=sy+sh-v*sh;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=SILVER; ctx.lineWidth=1.2;
    ctx.stroke();

    ctx.globalAlpha=1; ctx.restore();
  }

  // Highlight extracted peaks with isotope labels
  function drawFeatureExtraction(t){
    if(t<P.B) return;
    var a=ease(clamp01((t-P.B)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    var sx=25, sy=85, sw=395, sh=205;

    // "BARNI Peak Finder" label
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('BARNI Peak Finder', sx+sw/2, sy+sh+38, VIOLET);

    // Highlight each peak
    for(var p=0;p<features.length;p++){
      var delay=p*0.08;
      var pa=ease(clamp01((a-delay)/0.35));
      if(pa<=0) continue;
      ctx.globalAlpha=a*pa;

      var x=sx+features[p].pos*sw;
      var y=sy+sh-features[p].amp*sh;

      // Vertical dashed line from marker to x-axis
      ctx.setLineDash([3,4]);
      ctx.strokeStyle='rgba(123,94,192,0.5)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x,sy+sh); ctx.stroke();
      ctx.setLineDash([]);

      // Circle marker on the peak
      ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2);
      ctx.fillStyle=VIOLET; ctx.fill();
      ctx.strokeStyle=BG; ctx.lineWidth=1.8; ctx.stroke();

      // Isotope label above the marker
      ctx.font='600 14px "Google Sans","Noto Sans",sans-serif';
      if(features[p].pos<0.05){
        ctx.textAlign='left';
        haloText(features[p].label, x-2, y-14, VIOLET);
      } else {
        ctx.textAlign='center';
        haloText(features[p].label, x, y-14, VIOLET);
      }
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Feature vector -> classifier blocks
  function drawClassifiers(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    var sx=25, sy=85, sw=395, sh=205;

    // Arrow from spectrum to feature vector
    var arrowStartX=sx+sw+12;
    var arrowStartY=sy+sh/2;
    var fvX=450, fvY=90, fvW=32, fvH=200;

    drawArrow(arrowStartX, arrowStartY, fvX-2, arrowStartY, C.gray8);

    // Feature vector column
    ctx.fillStyle=C.boxFillV; ctx.strokeStyle=VIOLET; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(fvX,fvY,fvW,fvH,4); ctx.fill(); ctx.stroke();

    // Feature cells
    var nCells=features.length;
    var cellH=fvH/nCells;
    for(var i=0;i<nCells;i++){
      var intensity=features[i].amp;
      var r=Math.round(lerp(243,123,intensity));
      var g=Math.round(lerp(239,94,intensity));
      var b=Math.round(lerp(248,167,intensity));
      ctx.fillStyle='rgb('+r+','+g+','+b+')';
      ctx.fillRect(fvX+2, fvY+2+i*cellH, fvW-4, cellH-2);
    }

    ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Features', fvX+fvW/2, fvY-8, C.gray1);

    // Three classifier blocks
    var clsX=525, clsW=135, clsH=58, clsGap=14;
    var totalH=classifiers.length*(clsH+clsGap)-clsGap;
    var clsStartY=fvY+(fvH-totalH)/2;

    for(var c=0;c<classifiers.length;c++){
      var delay=c*0.15;
      var ca=ease(clamp01((a-delay)/0.5));
      if(ca<=0) continue;
      ctx.globalAlpha=a*ca;

      var cy=clsStartY+c*(clsH+clsGap);
      var cl=classifiers[c];

      // Arrow from feature vector to classifier
      drawArrow(fvX+fvW+4, fvY+fvH/2, clsX-4, cy+clsH/2, C.gray8);

      // Classifier box
      ctx.fillStyle=C.panelFill; ctx.strokeStyle=cl.color; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.roundRect(clsX,cy,clsW,clsH,6); ctx.fill(); ctx.stroke();

      // Classifier name
      ctx.font='700 20px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText(cl.name, clsX+clsW/2, cy+clsH/2+7, cl.color);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=lw||2.25;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-10.5*Math.cos(ang-0.35),y2-10.5*Math.sin(ang-0.35));
    ctx.lineTo(x2-10.5*Math.cos(ang+0.35),y2-10.5*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  // F1 score comparison bars
  function drawResults(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.6));
    ctx.save(); ctx.globalAlpha=a;

    // Results panel - shifted up since pipeline is removed
    var rx=25, ry=365, rw=555, rh=185;
    ctx.fillStyle=C.panelFill; ctx.strokeStyle=C.panelStroke; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,8); ctx.fill(); ctx.stroke();

    ctx.font='600 22px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('F1 Score Comparison', rx+rw/2, ry+28, C.gray4);

    // Bar chart
    var barX=rx+160, barMaxW=320, barH=34, barGap=10;
    var barStartY=ry+50;
    var maxF1=1.0;

    for(var c=0;c<classifiers.length;c++){
      var delay=c*0.2;
      var ba=ease(clamp01(((t-P.D-0.3)-delay)/0.8));
      if(ba<=0) continue;
      ctx.globalAlpha=a*ba;

      var by=barStartY+c*(barH+barGap);
      var cl=classifiers[c];
      var barW=(cl.f1/maxF1)*barMaxW*ba;

      // Label
      ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='right';
      haloText(cl.name, barX-12, by+barH/2+7, cl.color);

      // Bar background
      ctx.fillStyle=C.barBg;
      ctx.beginPath(); ctx.roundRect(barX,by,barMaxW,barH,4); ctx.fill();

      // Bar fill
      ctx.fillStyle=cl.color;
      ctx.beginPath(); ctx.roundRect(barX,by,barW,barH,4); ctx.fill();

      // Score label on bar
      if(ba>0.5){
        var la=ease(clamp01((ba-0.5)/0.5));
        ctx.globalAlpha=a*la;
        ctx.font='700 22px "Google Sans","Noto Sans",sans-serif';
        ctx.textAlign='left';
        haloText(cl.f1.toFixed(3), barX+barW+10, by+barH/2+8, cl.color);
      }
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Winner highlight
  function drawWinner(t){
    if(t<P.E) return;
    var a=ease(clamp01((t-P.E)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    // Winner panel
    var wx=595, wy=365, ww=180, wh=200;
    ctx.fillStyle=C.boxFillC; ctx.strokeStyle=SANGUINE; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.roundRect(wx,wy,ww,wh,8); ctx.fill(); ctx.stroke();

    // Star
    ctx.font='36px sans-serif'; ctx.textAlign='center';
    ctx.fillText('\u2605', wx+ww/2, wy+40);

    ctx.font='700 22px "Google Sans","Noto Sans",sans-serif';
    haloText('XGBoost', wx+ww/2, wy+65, SANGUINE);

    ctx.font='18px "Noto Sans",sans-serif';
    haloText('Best Overall', wx+ww/2, wy+88, C.gray1);

    // Key stats
    var stats=[
      {label:'Macro F1', val:'0.910'},
      {label:'Train Time', val:'5.97 s'},
      {label:'One-vs-All', val:'33 classes'}
    ];
    for(var i=0;i<stats.length;i++){
      var sy=wy+110+i*32;
      ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText(stats[i].label, wx+ww/2, sy, C.gray9);
      ctx.font='700 20px "Google Sans","Noto Sans",sans-serif';
      haloText(stats[i].val, wx+ww/2, sy+18, C.gray4);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Title
  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 30px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Classifier Comparison for Radionuclide Identification', W/2, 40, C.title);
    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=C.BG; ctx.fillRect(0,0,W,H);

    // Global fade
    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawSpectrum(t);
    drawFeatureExtraction(t);
    drawClassifiers(t);
    drawResults(t);
    drawWinner(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
