<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Score-based LR Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var SILVER='#636E80', ROSE='#D4988E', SANGUINE='#E0756A', VIOLET='#7B5EC0';
  var CHARCOAL='#3A3D45', BG='#fdfcfb';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function haloText(text,x,y,fill,hp){
    hp=hp||5; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=(lw||1.5)*1.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    var headLen=10.5;
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-headLen*Math.cos(ang-0.35),y2-headLen*Math.sin(ang-0.35));
    ctx.lineTo(x2-headLen*Math.cos(ang+0.35),y2-headLen*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  function gauss(x,mu,sig){ var d=(x-mu)/sig; return Math.exp(-0.5*d*d); }

  // Fake "text lines" for document visuals
  var textLinesQ=[], textLinesK=[];
  for(var i=0;i<6;i++){
    textLinesQ.push(0.3+Math.random()*0.65);
    textLinesK.push(0.3+Math.random()*0.65);
  }

  // Fake embedding bars
  var embQ=[], embK=[];
  for(var i=0;i<12;i++){
    embQ.push((Math.random()-0.5)*2);
    embK.push((Math.random()-0.5)*2);
    embK[i]=embQ[i]*0.7+(Math.random()-0.5)*0.8;
  }

  var scoreVal=0.23;
  var saMu=0.18, saSig=0.10;
  var daMu=0.55, daSig=0.14;
  var pSa=gauss(scoreVal,saMu,saSig);
  var pDa=gauss(scoreVal,daMu,daSig);
  var LR=(pSa/pDa).toFixed(1);

  // ---- Dynamic Layout: Present Big Then Shrink ----

  // Shrink 1: Documents (big centered -> small left column)
  var QDOC_BIG  = {x:250, y:100, w:280, h:150};
  var QDOC_SMALL= {x:30,  y:75,  w:150, h:95};
  var KDOC_BIG  = {x:250, y:310, w:280, h:150};
  var KDOC_SMALL= {x:30,  y:200, w:150, h:95};
  var SHRINK1_T0=2.5, SHRINK1_T1=3.5;

  function getShrink1(t){
    if(t<=SHRINK1_T0) return 0;
    if(t>=SHRINK1_T1) return 1;
    return ease((t-SHRINK1_T0)/(SHRINK1_T1-SHRINK1_T0));
  }
  function lerpRect(big,small,p){
    return {x:lerp(big.x,small.x,p), y:lerp(big.y,small.y,p),
            w:lerp(big.w,small.w,p), h:lerp(big.h,small.h,p)};
  }

  // Distribution plot (fixed position, no shrink)
  var plotX=30, plotY=355, plotW=540, plotH=220;

  // Fixed layout (appear after shrink 1)
  var modelW=140, modelH=130;
  var modelX=260, modelY=108;
  var vecW=30, vecH=70;
  var vecX=450;
  var scoreW=130, scoreH=70;
  var scoreBX=540, scoreBY=138;

  // LR result panel
  var lrW=170, lrH=210;
  var lrX=595, lrY=355;

  // Phase timing (first shrink only)
  var P={
    A:0, A_end:2.5,           // Two text documents appear (BIG)
    // SHRINK1: 2.5-3.5
    B:3.6, B_end:5.5,         // Embedding model + vectors
    C:5.2, C_end:6.8,         // Distance -> score
    D:6.5, D_end:9.2,         // Score distributions + LR
    E:8.8, E_end:10.8,        // LR result interpretation
    FADE_START:11.5,
    FADE_END:12.8,
    TOTAL:13.5
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  // Title
  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 28px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Score-based Likelihood Ratios', W/2, 38, '#2a2d35');
    ctx.globalAlpha=1; ctx.restore();
  }

  // Draw a mini "document" with fake text lines (scalable)
  function drawDoc(x,y,w,h,lines,label,labelCol,a){
    ctx.save(); ctx.globalAlpha=a;
    var sc=w/150; // scale relative to SMALL doc width

    // Page
    ctx.fillStyle='#fff'; ctx.strokeStyle='#d0d4dc'; ctx.lineWidth=Math.max(1,1.5*Math.min(sc,2));
    ctx.beginPath(); ctx.roundRect(x,y,w,h,Math.min(6*sc,12)); ctx.fill(); ctx.stroke();

    // Fake text lines — scale spacing to fit within height
    var topPad=Math.min(16*sc, h*0.14);
    var lx=x+Math.min(12*sc, w*0.08), lw=w-2*Math.min(12*sc, w*0.08);
    var availH=h-topPad*2;
    var lineH=Math.min(16*sc, availH/lines.length);
    var lineThick=Math.max(4, lineH*0.5);
    var ly=y+topPad;

    for(var i=0;i<lines.length;i++){
      var lineW=lines[i]*lw;
      ctx.fillStyle='#d8dbe3';
      ctx.beginPath(); ctx.roundRect(lx, ly+i*lineH, lineW, lineThick, Math.min(3*sc,lineThick/2)); ctx.fill();
    }

    // Label below (capped scale for label)
    var labelSc=Math.min(sc, 1.5);
    ctx.font='600 '+Math.max(18,Math.round(18*labelSc))+'px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText(label, x+w/2, y+h+Math.min(22, 18*labelSc), labelCol);

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase A: two documents (dynamic position)
  function drawDocuments(t){
    var a=ease(clamp01((t-P.A)/0.8));
    if(a<=0) return;

    var p1=getShrink1(t);
    var qr=lerpRect(QDOC_BIG, QDOC_SMALL, p1);
    var kr=lerpRect(KDOC_BIG, KDOC_SMALL, p1);

    var qa=ease(clamp01(a/0.6));
    drawDoc(qr.x, qr.y, qr.w, qr.h, textLinesQ, 'Questioned Text', ROSE, qa);

    var ka2=ease(clamp01((a-0.3)/0.6));
    drawDoc(kr.x, kr.y, kr.w, kr.h, textLinesK, 'Known Text', SILVER, ka2);
  }

  // Phase B: embedding model + vectors (fixed positions, appear after shrink 1)
  function drawEmbedding(t){
    if(t<P.B) return;
    var a=ease(clamp01((t-P.B)/0.8));
    ctx.save();

    // Arrows from docs to model
    var aa=ease(clamp01(a/0.4));
    ctx.globalAlpha=aa;
    var qDocR=QDOC_SMALL, kDocR=KDOC_SMALL;
    drawArrow(qDocR.x+qDocR.w+5, qDocR.y+qDocR.h/2, modelX-6, modelY+35, '#ccc');
    drawArrow(kDocR.x+kDocR.w+5, kDocR.y+kDocR.h/2, modelX-6, modelY+modelH-35, '#ccc');

    // Model box
    var ma=ease(clamp01((a-0.1)/0.5));
    ctx.globalAlpha=ma;
    ctx.fillStyle='#EBE4F8'; ctx.strokeStyle=VIOLET; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.roundRect(modelX,modelY,modelW,modelH,10); ctx.fill(); ctx.stroke();

    ctx.font='700 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Stylometric', modelX+modelW/2, modelY+40, VIOLET);
    haloText('Embedding', modelX+modelW/2, modelY+62, VIOLET);

    ctx.font='16px "Noto Sans",sans-serif';
    haloText('Style Features', modelX+modelW/2, modelY+90, '#aaa');

    // Output vectors
    var va=ease(clamp01((a-0.4)/0.5));
    if(va>0){
      ctx.globalAlpha=va;
      drawArrow(modelX+modelW+6, modelY+35, vecX-6, modelY+10, '#ccc');
      drawArrow(modelX+modelW+6, modelY+modelH-35, vecX-6, modelY+modelH-10, '#ccc');

      // Questioned embedding vector
      var vy1=modelY-30;
      ctx.fillStyle='#FAEDED'; ctx.strokeStyle=ROSE; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(vecX,vy1,vecW,vecH,4); ctx.fill(); ctx.stroke();
      for(var i=0;i<12;i++){
        var v=embQ[i];
        var c=v>0?'rgba(212,152,142,'+(0.3+Math.abs(v)*0.35)+')':'rgba(99,110,128,'+(0.3+Math.abs(v)*0.35)+')';
        ctx.fillStyle=c;
        ctx.fillRect(vecX+3, vy1+3+i*(vecH-6)/12, vecW-6, (vecH-6)/12-1);
      }
      ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('e_Q', vecX+vecW/2, vy1-8, ROSE);

      // Known embedding vector
      var vy2=modelY+modelH-vecH+30;
      ctx.fillStyle='#e8eaed'; ctx.strokeStyle=SILVER; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(vecX,vy2,vecW,vecH,4); ctx.fill(); ctx.stroke();
      for(var i=0;i<12;i++){
        var v=embK[i];
        var c=v>0?'rgba(212,152,142,'+(0.3+Math.abs(v)*0.35)+')':'rgba(99,110,128,'+(0.3+Math.abs(v)*0.35)+')';
        ctx.fillStyle=c;
        ctx.fillRect(vecX+3, vy2+3+i*(vecH-6)/12, vecW-6, (vecH-6)/12-1);
      }
      ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('e_K', vecX+vecW/2, vy2-8, SILVER);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase C: distance -> score (fixed positions)
  function drawScore(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.7));
    ctx.save(); ctx.globalAlpha=a;

    drawArrow(vecX+vecW+5, modelY+25, scoreBX-6, scoreBY+20, '#ccc');
    drawArrow(vecX+vecW+5, modelY+modelH-25, scoreBX-6, scoreBY+scoreH-20, '#ccc');

    ctx.fillStyle='#fafaf8'; ctx.strokeStyle='#ddd8d3'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(scoreBX,scoreBY,scoreW,scoreH,8); ctx.fill(); ctx.stroke();

    ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Distance Score', scoreBX+scoreW/2, scoreBY+22, '#555');

    ctx.font='16px "Noto Sans",sans-serif';
    haloText('d(e_Q, e_K)', scoreBX+scoreW/2, scoreBY+40, '#aaa');

    var va=ease(clamp01((a-0.3)/0.5));
    if(va>0){
      ctx.globalAlpha=a*va;
      ctx.font='700 24px "Google Sans","Noto Sans",sans-serif';
      haloText('s = '+scoreVal.toFixed(2), scoreBX+scoreW/2, scoreBY+63, VIOLET);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase D: score distributions (fixed position)
  function drawDistributions(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    // Distribution plot area
    ctx.fillStyle='#fafaf8'; ctx.strokeStyle='#ddd8d3'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(plotX-10,plotY-30,plotW+20,plotH+60,10); ctx.fill(); ctx.stroke();

    // "Score-based Likelihood Ratio" label
    ctx.font='600 22px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Score-based Likelihood Ratio', plotX+plotW/2, plotY-6, '#444');

    // Axes
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(plotX,plotY); ctx.lineTo(plotX,plotY+plotH); ctx.lineTo(plotX+plotW,plotY+plotH); ctx.stroke();

    // Axis labels
    ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Score s', plotX+plotW/2, plotY+plotH+22, '#aaa');
    ctx.save(); ctx.translate(plotX-20, plotY+plotH/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';
    haloText('Density', 0, 0, '#aaa');
    ctx.restore();

    // Same-author distribution (green)
    var saA=ease(clamp01((a-0.1)/0.5));
    if(saA>0){
      ctx.globalAlpha=a*saA;
      ctx.beginPath();
      ctx.moveTo(plotX, plotY+plotH);
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,saMu,saSig);
        ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.lineTo(plotX+plotW, plotY+plotH);
      ctx.closePath();
      ctx.fillStyle='rgba(224,117,106,0.15)';
      ctx.fill();

      ctx.beginPath();
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,saMu,saSig);
        if(i===0) ctx.moveTo(plotX+i, plotY+plotH-v*plotH*0.85);
        else ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.strokeStyle=SANGUINE; ctx.lineWidth=2.5; ctx.stroke();

      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='left';
      haloText('H\u2081: Same author', plotX+saMu*plotW-25, plotY+22, SANGUINE);
    }

    // Different-author distribution (red)
    var daA=ease(clamp01((a-0.3)/0.5));
    if(daA>0){
      ctx.globalAlpha=a*daA;
      ctx.beginPath();
      ctx.moveTo(plotX, plotY+plotH);
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,daMu,daSig);
        ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.lineTo(plotX+plotW, plotY+plotH);
      ctx.closePath();
      ctx.fillStyle='rgba(58,61,69,0.10)';
      ctx.fill();

      ctx.beginPath();
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,daMu,daSig);
        if(i===0) ctx.moveTo(plotX+i, plotY+plotH-v*plotH*0.85);
        else ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.strokeStyle=CHARCOAL; ctx.lineWidth=2.5; ctx.stroke();

      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='left';
      haloText('H\u2082: Different authors', plotX+daMu*plotW-30, plotY+44, CHARCOAL);
    }

    // Score marker line
    var smA=ease(clamp01((a-0.5)/0.4));
    if(smA>0){
      ctx.globalAlpha=a*smA;
      var scoreX=plotX+scoreVal*plotW;

      ctx.setLineDash([5,4]);
      ctx.strokeStyle=VIOLET; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(scoreX, plotY); ctx.lineTo(scoreX, plotY+plotH); ctx.stroke();
      ctx.setLineDash([]);

      ctx.font='700 14px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('s = '+scoreVal.toFixed(2), scoreX, plotY+14, VIOLET);

      var pSaVal=gauss(scoreVal,saMu,saSig);
      var pDaVal=gauss(scoreVal,daMu,daSig);
      var saY=plotY+plotH-pSaVal*plotH*0.85;
      var daY=plotY+plotH-pDaVal*plotH*0.85;

      ctx.beginPath(); ctx.arc(scoreX, saY, 7, 0, Math.PI*2);
      ctx.fillStyle=SANGUINE; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();

      ctx.beginPath(); ctx.arc(scoreX, daY, 7, 0, Math.PI*2);
      ctx.fillStyle=CHARCOAL; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    }

    // Arrow to LR panel
    var lrA=ease(clamp01((a-0.7)/0.3));
    if(lrA>0){
      ctx.globalAlpha=a*lrA;
      drawArrow(plotX+plotW+14, plotY+40, lrX-6, plotY+40, '#ccc');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase E: LR result panel
  function drawLRResult(t){
    if(t<P.E) return;
    var a=ease(clamp01((t-P.E)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    ctx.fillStyle='#fdf0f0'; ctx.strokeStyle=SANGUINE; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(lrX,lrY,lrW,lrH,10); ctx.fill(); ctx.stroke();

    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Likelihood Ratio', lrX+lrW/2, lrY+28, '#444');

    ctx.font='16px "Noto Sans",sans-serif';
    haloText('P(s | H\u2081)', lrX+lrW/2, lrY+58, SANGUINE);

    ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(lrX+30, lrY+66); ctx.lineTo(lrX+lrW-30, lrY+66); ctx.stroke();

    haloText('P(s | H\u2082)', lrX+lrW/2, lrY+84, CHARCOAL);

    var va=ease(clamp01((a-0.3)/0.5));
    if(va>0){
      ctx.globalAlpha=a*va;
      ctx.font='700 36px "Google Sans","Noto Sans",sans-serif';
      haloText(LR, lrX+lrW/2, lrY+130, SANGUINE);

      ctx.font='14px "Noto Sans",sans-serif';
      haloText('Evidence supports', lrX+lrW/2, lrY+158, '#888');

      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      haloText('same authorship', lrX+lrW/2, lrY+180, SANGUINE);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawDocuments(t);
    drawEmbedding(t);
    drawScore(t);
    drawDistributions(t);
    drawLRResult(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
