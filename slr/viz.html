<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Score-based LR Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var BLUE='#6C8EBF', ORANGE='#D79B00', GREEN='#82B366', PURPLE='#9673A6';
  var RED='#B85450', BG='#fdfdfe';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function haloText(text,x,y,fill,hp){
    hp=hp||3; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=lw||1.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-7*Math.cos(ang-0.35),y2-7*Math.sin(ang-0.35));
    ctx.lineTo(x2-7*Math.cos(ang+0.35),y2-7*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  // Gaussian PDF
  function gauss(x,mu,sig){ var d=(x-mu)/sig; return Math.exp(-0.5*d*d); }

  // Fake "text lines" for document visuals
  var textLinesQ=[], textLinesK=[];
  for(var i=0;i<7;i++){
    textLinesQ.push(0.3+Math.random()*0.65);
    textLinesK.push(0.3+Math.random()*0.65);
  }

  // Fake embedding bars
  var embQ=[], embK=[];
  for(var i=0;i<12;i++){
    embQ.push((Math.random()-0.5)*2);
    embK.push((Math.random()-0.5)*2);
    // Make them somewhat similar (same-author scenario)
    embK[i]=embQ[i]*0.7+(Math.random()-0.5)*0.8;
  }

  // Score value (cosine-distance-like, low = similar)
  var scoreVal=0.23;
  // Same-author distribution: centered at 0.2, narrow
  var saMu=0.18, saSig=0.10;
  // Different-author distribution: centered at 0.55, wider
  var daMu=0.55, daSig=0.14;

  // LR at score
  var pSa=gauss(scoreVal,saMu,saSig);
  var pDa=gauss(scoreVal,daMu,daSig);
  var LR=(pSa/pDa).toFixed(1);

  // Phase timing
  var P={
    A:0, A_end:2.0,       // Two text documents appear
    B:1.8, B_end:4.0,     // Embedding model + vectors
    C:3.8, C_end:5.5,     // Distance → score
    D:5.2, D_end:9.0,     // Score distributions + LR
    E:8.5, E_end:10.5,    // Interpretation
    FADE_START:11.0,
    FADE_END:12.5,
    TOTAL:13.0
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 19px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Score-based Likelihood Ratios for Authorship Verification', W/2, 32, '#1a1a1a');
    ctx.font='12px "Noto Sans",sans-serif';
    haloText('Quantifying authorship evidence with stylometric text embeddings', W/2, 50, '#999');
    ctx.globalAlpha=1; ctx.restore();
  }

  // Draw a mini "document" with fake text lines
  function drawDoc(x,y,w,h,lines,label,labelCol,a){
    ctx.save(); ctx.globalAlpha=a;

    // Page
    ctx.fillStyle='#fff'; ctx.strokeStyle='#d0d4dc'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,5); ctx.fill(); ctx.stroke();

    // Fake text lines
    var lx=x+10, ly=y+14, lw=w-20;
    for(var i=0;i<lines.length;i++){
      var lineW=lines[i]*lw;
      ctx.fillStyle='#d8dbe3';
      ctx.beginPath(); ctx.roundRect(lx, ly+i*11, lineW, 5, 2); ctx.fill();
    }

    // Label below
    ctx.font='600 10px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText(label, x+w/2, y+h+14, labelCol);

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase A: two documents
  function drawDocuments(t){
    var a=ease(clamp01((t-P.A)/0.8));
    if(a<=0) return;

    var qx=60, qy=80, dw=120, dh=95;
    var qa=ease(clamp01(a/0.6));
    drawDoc(qx, qy, dw, dh, textLinesQ, 'Questioned Text', ORANGE, qa);

    var kx=60, ky=210, ka2=ease(clamp01((a-0.3)/0.6));
    drawDoc(kx, ky, dw, dh, textLinesK, 'Known Text', BLUE, ka2);

    // "Same author?" label
    if(a>0.6){
      var la=ease(clamp01((a-0.6)/0.4));
      ctx.save(); ctx.globalAlpha=la;
      ctx.font='italic 10px "Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('Same author?', qx+dw/2, ky+dh+30, '#aaa');
      ctx.restore();
    }
  }

  // Phase B: embedding model + vectors
  function drawEmbedding(t){
    if(t<P.B) return;
    var a=ease(clamp01((t-P.B)/0.8));
    ctx.save();

    // Arrows from docs to model
    var modelX=260, modelY=130, modelW=110, modelH=110;

    var aa=ease(clamp01(a/0.4));
    ctx.globalAlpha=aa;
    drawArrow(185, 130, modelX-4, modelY+30, '#ccc');
    drawArrow(185, 260, modelX-4, modelY+modelH-30, '#ccc');

    // Model box
    var ma=ease(clamp01((a-0.1)/0.5));
    ctx.globalAlpha=ma;
    ctx.fillStyle='#f0ecf5'; ctx.strokeStyle=PURPLE; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(modelX,modelY,modelW,modelH,8); ctx.fill(); ctx.stroke();

    ctx.font='700 12px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Stylometric', modelX+modelW/2, modelY+30, PURPLE);
    haloText('Embedding', modelX+modelW/2, modelY+46, PURPLE);

    ctx.font='9px "Noto Sans",sans-serif';
    haloText('Pretrained model', modelX+modelW/2, modelY+65, '#aaa');
    haloText('Topic-invariant', modelX+modelW/2, modelY+78, '#aaa');
    haloText('style features', modelX+modelW/2, modelY+91, '#aaa');

    // Output vectors
    var vecX=400, vecW=20, vecH=70;
    var va=ease(clamp01((a-0.4)/0.5));
    if(va>0){
      ctx.globalAlpha=va;

      // Arrows from model to vectors
      drawArrow(modelX+modelW+4, modelY+30, vecX-4, modelY+10, '#ccc');
      drawArrow(modelX+modelW+4, modelY+modelH-30, vecX-4, modelY+modelH-10, '#ccc');

      // Questioned embedding vector
      var vy1=modelY-5;
      ctx.fillStyle='#fff5eb'; ctx.strokeStyle=ORANGE; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.roundRect(vecX,vy1,vecW,vecH,3); ctx.fill(); ctx.stroke();
      for(var i=0;i<12;i++){
        var v=embQ[i];
        var c=v>0?'rgba(215,155,0,'+(0.3+Math.abs(v)*0.35)+')':'rgba(108,142,191,'+(0.3+Math.abs(v)*0.35)+')';
        ctx.fillStyle=c;
        ctx.fillRect(vecX+2, vy1+2+i*(vecH-4)/12, vecW-4, (vecH-4)/12-1);
      }
      ctx.font='8px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('e_Q', vecX+vecW/2, vy1-4, ORANGE, 2);

      // Known embedding vector
      var vy2=modelY+modelH-vecH+5;
      ctx.fillStyle='#eef3fb'; ctx.strokeStyle=BLUE; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.roundRect(vecX,vy2,vecW,vecH,3); ctx.fill(); ctx.stroke();
      for(var i=0;i<12;i++){
        var v=embK[i];
        var c=v>0?'rgba(215,155,0,'+(0.3+Math.abs(v)*0.35)+')':'rgba(108,142,191,'+(0.3+Math.abs(v)*0.35)+')';
        ctx.fillStyle=c;
        ctx.fillRect(vecX+2, vy2+2+i*(vecH-4)/12, vecW-4, (vecH-4)/12-1);
      }
      ctx.font='8px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('e_K', vecX+vecW/2, vy2-4, BLUE, 2);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase C: distance → score
  function drawScore(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.7));
    ctx.save(); ctx.globalAlpha=a;

    var sx=455, sy=155;

    // Arrows from vectors to score
    drawArrow(424, 160, sx-4, sy+10, '#ccc');
    drawArrow(424, 215, sx-4, sy+15, '#ccc');

    // Score box
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(sx,sy,100,55,6); ctx.fill(); ctx.stroke();

    ctx.font='600 10px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Distance Score', sx+50, sy+15, '#555');

    ctx.font='9px "Noto Sans",sans-serif';
    haloText('d(e_Q, e_K)', sx+50, sy+28, '#aaa');

    // Score value
    var va=ease(clamp01((a-0.3)/0.5));
    if(va>0){
      ctx.globalAlpha=a*va;
      ctx.font='700 16px "Google Sans","Noto Sans",sans-serif';
      haloText('s = '+scoreVal.toFixed(2), sx+50, sy+47, PURPLE);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase D: score distributions + LR
  function drawDistributions(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    // Distribution plot area
    var px=60, py=375, pw=530, ph=170;

    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(px-10,py-25,pw+20,ph+55,8); ctx.fill(); ctx.stroke();

    ctx.font='600 13px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Score-based Likelihood Ratio', px+pw/2, py-8, '#444');

    // Axes
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();

    ctx.font='9px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Score s', px+pw/2, py+ph+16, '#aaa');
    ctx.save(); ctx.translate(px-14, py+ph/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';
    haloText('Density', 0, 0, '#aaa');
    ctx.restore();

    // X-axis ticks
    ctx.font='7px "Noto Sans",sans-serif';
    for(var i=0;i<=10;i++){
      var tx=px+(i/10)*pw;
      haloText((i/10).toFixed(1), tx, py+ph+8, '#ccc');
    }

    // Draw same-author distribution (green)
    var saA=ease(clamp01((a-0.1)/0.5));
    if(saA>0){
      ctx.globalAlpha=a*saA;
      ctx.beginPath();
      ctx.moveTo(px, py+ph);
      for(var i=0;i<=pw;i++){
        var s=i/pw;
        var v=gauss(s,saMu,saSig);
        ctx.lineTo(px+i, py+ph-v*ph*0.85);
      }
      ctx.lineTo(px+pw, py+ph);
      ctx.closePath();
      ctx.fillStyle='rgba(130,179,102,0.15)';
      ctx.fill();

      ctx.beginPath();
      for(var i=0;i<=pw;i++){
        var s=i/pw;
        var v=gauss(s,saMu,saSig);
        if(i===0) ctx.moveTo(px+i, py+ph-v*ph*0.85);
        else ctx.lineTo(px+i, py+ph-v*ph*0.85);
      }
      ctx.strokeStyle=GREEN; ctx.lineWidth=2; ctx.stroke();

      // Label
      ctx.font='600 10px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='left';
      haloText('H\u2081: Same author', px+saMu*pw-20, py+15, GREEN);
    }

    // Draw different-author distribution (red/orange)
    var daA=ease(clamp01((a-0.3)/0.5));
    if(daA>0){
      ctx.globalAlpha=a*daA;
      ctx.beginPath();
      ctx.moveTo(px, py+ph);
      for(var i=0;i<=pw;i++){
        var s=i/pw;
        var v=gauss(s,daMu,daSig);
        ctx.lineTo(px+i, py+ph-v*ph*0.85);
      }
      ctx.lineTo(px+pw, py+ph);
      ctx.closePath();
      ctx.fillStyle='rgba(184,84,80,0.12)';
      ctx.fill();

      ctx.beginPath();
      for(var i=0;i<=pw;i++){
        var s=i/pw;
        var v=gauss(s,daMu,daSig);
        if(i===0) ctx.moveTo(px+i, py+ph-v*ph*0.85);
        else ctx.lineTo(px+i, py+ph-v*ph*0.85);
      }
      ctx.strokeStyle=RED; ctx.lineWidth=2; ctx.stroke();

      ctx.font='600 10px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='left';
      haloText('H\u2082: Different authors', px+daMu*pw-20, py+30, RED);
    }

    // Score marker line
    var smA=ease(clamp01((a-0.5)/0.4));
    if(smA>0){
      ctx.globalAlpha=a*smA;
      var scoreX=px+scoreVal*pw;

      ctx.setLineDash([4,3]);
      ctx.strokeStyle=PURPLE; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(scoreX, py); ctx.lineTo(scoreX, py+ph); ctx.stroke();
      ctx.setLineDash([]);

      ctx.font='700 10px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('s = '+scoreVal.toFixed(2), scoreX, py-3, PURPLE);

      // Show the two density values
      var pSaVal=gauss(scoreVal,saMu,saSig);
      var pDaVal=gauss(scoreVal,daMu,daSig);
      var saY=py+ph-pSaVal*ph*0.85;
      var daY=py+ph-pDaVal*ph*0.85;

      // Dots on curves
      ctx.beginPath(); ctx.arc(scoreX, saY, 4, 0, Math.PI*2);
      ctx.fillStyle=GREEN; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();

      ctx.beginPath(); ctx.arc(scoreX, daY, 4, 0, Math.PI*2);
      ctx.fillStyle=RED; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    }

    // LR result
    var lrA=ease(clamp01((a-0.7)/0.3));
    if(lrA>0){
      ctx.globalAlpha=a*lrA;

      // Arrow from score to LR panel
      drawArrow(555, py+30, 610, py+30, '#ccc');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase D/E: LR result panel
  function drawLRResult(t){
    if(t<P.D+1.5) return;
    var a=ease(clamp01((t-P.D-1.5)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    var rx=615, ry=365, rw=145, rh=195;

    ctx.fillStyle='#f4f9f4'; ctx.strokeStyle=GREEN; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,8); ctx.fill(); ctx.stroke();

    ctx.font='600 12px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Likelihood Ratio', rx+rw/2, ry+20, '#444');

    // Formula
    ctx.font='10px "Noto Sans",sans-serif';
    haloText('P(s | H\u2081)', rx+rw/2, ry+45, GREEN);

    // Fraction line
    ctx.strokeStyle='#888'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(rx+30, ry+52); ctx.lineTo(rx+rw-30, ry+52); ctx.stroke();

    haloText('P(s | H\u2082)', rx+rw/2, ry+67, RED);

    // LR value
    var va=ease(clamp01((a-0.3)/0.5));
    if(va>0){
      ctx.globalAlpha=a*va;
      ctx.font='700 28px "Google Sans","Noto Sans",sans-serif';
      haloText(LR, rx+rw/2, ry+105, GREEN);

      ctx.font='10px "Noto Sans",sans-serif';
      haloText('Evidence supports', rx+rw/2, ry+130, '#888');
      ctx.font='600 11px "Google Sans","Noto Sans",sans-serif';
      haloText('same authorship', rx+rw/2, ry+145, GREEN);

      // Interpretation scale
      ctx.globalAlpha=a*va*0.7;
      ctx.font='8px "Noto Sans",sans-serif';
      haloText('LR > 1: supports H\u2081', rx+rw/2, ry+168, '#aaa');
      haloText('LR < 1: supports H\u2082', rx+rw/2, ry+180, '#aaa');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Bottom pipeline
  function drawPipeline(t){
    if(t<2) return;
    var a=ease(clamp01((t-2)/0.6));
    ctx.save(); ctx.globalAlpha=a*0.8;

    var by=575;
    ctx.fillStyle='#f5f6f9'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(30,by,720,45,8); ctx.fill(); ctx.stroke();

    ctx.textAlign='center';
    var labels=[
      {text:'Text Pair', x:85, col:ORANGE},
      {text:'\u2192', x:140, col:'#bbb'},
      {text:'Stylometric Embed', x:230, col:PURPLE},
      {text:'\u2192', x:325, col:'#bbb'},
      {text:'Distance Score', x:410, col:'#555'},
      {text:'\u2192', x:490, col:'#bbb'},
      {text:'H\u2081 / H\u2082 Densities', x:585, col:'#555'},
      {text:'\u2192', x:670, col:'#bbb'},
      {text:'LR', x:710, col:GREEN}
    ];
    for(var i=0;i<labels.length;i++){
      ctx.font=labels[i].text==='\u2192'?'14px sans-serif':'600 10px "Google Sans","Noto Sans",sans-serif';
      haloText(labels[i].text, labels[i].x, by+18, labels[i].col);
    }
    ctx.font='italic 9px "Noto Sans",sans-serif';
    haloText('Topic-invariant stylometric features  |  Score-based forensic evidence quantification', W/2, by+34, '#aaa');

    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawTitle(t);
    drawDocuments(t);
    drawEmbedding(t);
    drawScore(t);
    drawDistributions(t);
    drawLRResult(t);
    drawPipeline(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
