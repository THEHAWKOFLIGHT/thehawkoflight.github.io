<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Score-based LR Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var BLUE='#6C8EBF', ORANGE='#D79B00', GREEN='#82B366', PURPLE='#9673A6';
  var RED='#B85450', BG='#fdfdfe';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  // Halo text with default stroke width 5px (#29)
  function haloText(text,x,y,fill,hp){
    hp=hp||5; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  // Arrows with 50% larger heads and line widths (#28)
  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=(lw||1.5)*1.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    var headLen=10.5; // was 7, scaled 50%
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-headLen*Math.cos(ang-0.35),y2-headLen*Math.sin(ang-0.35));
    ctx.lineTo(x2-headLen*Math.cos(ang+0.35),y2-headLen*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  // Gaussian PDF
  function gauss(x,mu,sig){ var d=(x-mu)/sig; return Math.exp(-0.5*d*d); }

  // Fake "text lines" for document visuals
  var textLinesQ=[], textLinesK=[];
  for(var i=0;i<6;i++){
    textLinesQ.push(0.3+Math.random()*0.65);
    textLinesK.push(0.3+Math.random()*0.65);
  }

  // Fake embedding bars
  var embQ=[], embK=[];
  for(var i=0;i<12;i++){
    embQ.push((Math.random()-0.5)*2);
    embK.push((Math.random()-0.5)*2);
    // Make them somewhat similar (same-author scenario)
    embK[i]=embQ[i]*0.7+(Math.random()-0.5)*0.8;
  }

  // Score value (cosine-distance-like, low = similar)
  var scoreVal=0.23;
  // Same-author distribution: centered at 0.2, narrow
  var saMu=0.18, saSig=0.10;
  // Different-author distribution: centered at 0.55, wider
  var daMu=0.55, daSig=0.14;

  // LR at score
  var pSa=gauss(scoreVal,saMu,saSig);
  var pDa=gauss(scoreVal,daMu,daSig);
  var LR=(pSa/pDa).toFixed(1);

  // Phase timing - identical to original
  var P={
    A:0, A_end:2.0,       // Two text documents appear
    B:1.8, B_end:4.0,     // Embedding model + vectors
    C:3.8, C_end:5.5,     // Distance -> score
    D:5.2, D_end:9.0,     // Score distributions + LR
    E:8.5, E_end:10.5,    // Interpretation
    FADE_START:11.0,
    FADE_END:12.5,
    TOTAL:13.0
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  // ========== LAYOUT CONSTANTS ==========
  // Top portion: documents, embedding model, vectors, score
  // Bottom portion: distribution plot, LR panel

  // Documents (#6): 150x115
  var docW=150, docH=115;
  var qDocX=30, qDocY=75;
  var kDocX=30, kDocY=215;

  // Embedding model box (#7): 140x130
  var modelW=140, modelH=130;
  var modelX=260, modelY=100;

  // Embedding vectors (#10): 30px wide, 90px tall
  var vecW=30, vecH=90;
  var vecX=450;

  // Score box (#12): 130x70
  var scoreW=130, scoreH=70;
  var scoreBX=540, scoreBY=125;

  // Distribution plot - enlarged (#16), bottom portion
  var plotX=30, plotY=355, plotW=540, plotH=220;

  // LR result panel (#22): 170x210
  var lrW=170, lrH=210;
  var lrX=595, lrY=355;

  // ========== DRAW FUNCTIONS ==========

  // Title: 28px bold, no subtitle (#1)
  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 28px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Score-based Likelihood Ratios', W/2, 38, '#1a1a1a');
    ctx.globalAlpha=1; ctx.restore();
  }

  // Draw a mini "document" with fake text lines
  // #4: thicker lines (8px height), wider gaps, labels 18px
  function drawDoc(x,y,w,h,lines,label,labelCol,a){
    ctx.save(); ctx.globalAlpha=a;

    // Page
    ctx.fillStyle='#fff'; ctx.strokeStyle='#d0d4dc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,6); ctx.fill(); ctx.stroke();

    // Fake text lines: 8px height (#3), wider gaps
    var lx=x+12, ly=y+16, lw=w-24;
    for(var i=0;i<lines.length;i++){
      var lineW=lines[i]*lw;
      ctx.fillStyle='#d8dbe3';
      ctx.beginPath(); ctx.roundRect(lx, ly+i*16, lineW, 8, 3); ctx.fill();
    }

    // Label below: 18px (#4)
    ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText(label, x+w/2, y+h+22, labelCol);

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase A: two documents
  function drawDocuments(t){
    var a=ease(clamp01((t-P.A)/0.8));
    if(a<=0) return;

    var qa=ease(clamp01(a/0.6));
    drawDoc(qDocX, qDocY, docW, docH, textLinesQ, 'Questioned Text', ORANGE, qa);

    var ka2=ease(clamp01((a-0.3)/0.6));
    drawDoc(kDocX, kDocY, docW, docH, textLinesK, 'Known Text', BLUE, ka2);

    // "Same author?" label: 18px (#5)
    if(a>0.6){
      var la=ease(clamp01((a-0.6)/0.4));
      ctx.save(); ctx.globalAlpha=la;
      ctx.font='italic 18px "Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('Same author?', qDocX+docW/2, kDocY+docH+50, '#aaa');
      ctx.restore();
    }
  }

  // Phase B: embedding model + vectors
  function drawEmbedding(t){
    if(t<P.B) return;
    var a=ease(clamp01((t-P.B)/0.8));
    ctx.save();

    // Arrows from docs to model
    var aa=ease(clamp01(a/0.4));
    ctx.globalAlpha=aa;
    drawArrow(qDocX+docW+5, qDocY+docH/2, modelX-6, modelY+35, '#ccc');
    drawArrow(kDocX+docW+5, kDocY+docH/2, modelX-6, modelY+modelH-35, '#ccc');

    // Model box
    var ma=ease(clamp01((a-0.1)/0.5));
    ctx.globalAlpha=ma;
    ctx.fillStyle='#f0ecf5'; ctx.strokeStyle=PURPLE; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.roundRect(modelX,modelY,modelW,modelH,10); ctx.fill(); ctx.stroke();

    // "Stylometric Embedding" text: 20px bold (#8)
    ctx.font='700 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Stylometric', modelX+modelW/2, modelY+40, PURPLE);
    haloText('Embedding', modelX+modelW/2, modelY+62, PURPLE);

    // Single "Style Features" at 16px (#9) replacing 3 small lines
    ctx.font='16px "Noto Sans",sans-serif';
    haloText('Style Features', modelX+modelW/2, modelY+90, '#aaa');

    // Output vectors
    var va=ease(clamp01((a-0.4)/0.5));
    if(va>0){
      ctx.globalAlpha=va;

      // Arrows from model to vectors
      drawArrow(modelX+modelW+6, modelY+35, vecX-6, modelY+10, '#ccc');
      drawArrow(modelX+modelW+6, modelY+modelH-35, vecX-6, modelY+modelH-10, '#ccc');

      // Questioned embedding vector (#10, #11)
      var vy1=modelY-10;
      ctx.fillStyle='#fff5eb'; ctx.strokeStyle=ORANGE; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(vecX,vy1,vecW,vecH,4); ctx.fill(); ctx.stroke();
      for(var i=0;i<12;i++){
        var v=embQ[i];
        var c=v>0?'rgba(215,155,0,'+(0.3+Math.abs(v)*0.35)+')':'rgba(108,142,191,'+(0.3+Math.abs(v)*0.35)+')';
        ctx.fillStyle=c;
        ctx.fillRect(vecX+3, vy1+3+i*(vecH-6)/12, vecW-6, (vecH-6)/12-1);
      }
      // e_Q label: 16px (#11)
      ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('e_Q', vecX+vecW/2, vy1-8, ORANGE);

      // Known embedding vector
      var vy2=modelY+modelH-vecH+10;
      ctx.fillStyle='#eef3fb'; ctx.strokeStyle=BLUE; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(vecX,vy2,vecW,vecH,4); ctx.fill(); ctx.stroke();
      for(var i=0;i<12;i++){
        var v=embK[i];
        var c=v>0?'rgba(215,155,0,'+(0.3+Math.abs(v)*0.35)+')':'rgba(108,142,191,'+(0.3+Math.abs(v)*0.35)+')';
        ctx.fillStyle=c;
        ctx.fillRect(vecX+3, vy2+3+i*(vecH-6)/12, vecW-6, (vecH-6)/12-1);
      }
      // e_K label: 16px (#11)
      ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('e_K', vecX+vecW/2, vy2-8, BLUE);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase C: distance -> score
  function drawScore(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.7));
    ctx.save(); ctx.globalAlpha=a;

    // Arrows from vectors to score box
    drawArrow(vecX+vecW+5, modelY+25, scoreBX-6, scoreBY+20, '#ccc');
    drawArrow(vecX+vecW+5, modelY+modelH-25, scoreBX-6, scoreBY+scoreH-20, '#ccc');

    // Score box (#12): 130x70
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(scoreBX,scoreBY,scoreW,scoreH,8); ctx.fill(); ctx.stroke();

    // "Distance Score" label: 18px (#13)
    ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Distance Score', scoreBX+scoreW/2, scoreBY+22, '#555');

    // "d(e_Q, e_K)": 16px (#14)
    ctx.font='16px "Noto Sans",sans-serif';
    haloText('d(e_Q, e_K)', scoreBX+scoreW/2, scoreBY+40, '#aaa');

    // Score value: 24px bold (#15)
    var va=ease(clamp01((a-0.3)/0.5));
    if(va>0){
      ctx.globalAlpha=a*va;
      ctx.font='700 24px "Google Sans","Noto Sans",sans-serif';
      haloText('s = '+scoreVal.toFixed(2), scoreBX+scoreW/2, scoreBY+63, PURPLE);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase D: score distributions + LR (#16-#21)
  function drawDistributions(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    // Distribution plot area - enlarged (#16)
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(plotX-10,plotY-30,plotW+20,plotH+60,10); ctx.fill(); ctx.stroke();

    // "Score-based Likelihood Ratio" label: 22px (#17)
    ctx.font='600 22px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Score-based Likelihood Ratio', plotX+plotW/2, plotY-6, '#444');

    // Axes
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(plotX,plotY); ctx.lineTo(plotX,plotY+plotH); ctx.lineTo(plotX+plotW,plotY+plotH); ctx.stroke();

    // Axis labels: 16px (#18)
    ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Score s', plotX+plotW/2, plotY+plotH+22, '#aaa');
    ctx.save(); ctx.translate(plotX-20, plotY+plotH/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';
    haloText('Density', 0, 0, '#aaa');
    ctx.restore();

    // REMOVED x-axis tick labels (#19)

    // Draw same-author distribution (green)
    var saA=ease(clamp01((a-0.1)/0.5));
    if(saA>0){
      ctx.globalAlpha=a*saA;
      ctx.beginPath();
      ctx.moveTo(plotX, plotY+plotH);
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,saMu,saSig);
        ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.lineTo(plotX+plotW, plotY+plotH);
      ctx.closePath();
      ctx.fillStyle='rgba(130,179,102,0.15)';
      ctx.fill();

      ctx.beginPath();
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,saMu,saSig);
        if(i===0) ctx.moveTo(plotX+i, plotY+plotH-v*plotH*0.85);
        else ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.strokeStyle=GREEN; ctx.lineWidth=2.5; ctx.stroke();

      // Distribution curve label: 18px (#20)
      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='left';
      haloText('H\u2081: Same author', plotX+saMu*plotW-25, plotY+22, GREEN);
    }

    // Draw different-author distribution (red/orange)
    var daA=ease(clamp01((a-0.3)/0.5));
    if(daA>0){
      ctx.globalAlpha=a*daA;
      ctx.beginPath();
      ctx.moveTo(plotX, plotY+plotH);
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,daMu,daSig);
        ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.lineTo(plotX+plotW, plotY+plotH);
      ctx.closePath();
      ctx.fillStyle='rgba(184,84,80,0.12)';
      ctx.fill();

      ctx.beginPath();
      for(var i=0;i<=plotW;i++){
        var s=i/plotW;
        var v=gauss(s,daMu,daSig);
        if(i===0) ctx.moveTo(plotX+i, plotY+plotH-v*plotH*0.85);
        else ctx.lineTo(plotX+i, plotY+plotH-v*plotH*0.85);
      }
      ctx.strokeStyle=RED; ctx.lineWidth=2.5; ctx.stroke();

      // Distribution curve label: 18px (#20)
      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='left';
      haloText('H\u2082: Different authors', plotX+daMu*plotW-30, plotY+44, RED);
    }

    // Score marker line
    var smA=ease(clamp01((a-0.5)/0.4));
    if(smA>0){
      ctx.globalAlpha=a*smA;
      var scoreX=plotX+scoreVal*plotW;

      ctx.setLineDash([5,4]);
      ctx.strokeStyle=PURPLE; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(scoreX, plotY); ctx.lineTo(scoreX, plotY+plotH); ctx.stroke();
      ctx.setLineDash([]);

      ctx.font='700 14px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('s = '+scoreVal.toFixed(2), scoreX, plotY-6, PURPLE);

      // Show the two density values
      var pSaVal=gauss(scoreVal,saMu,saSig);
      var pDaVal=gauss(scoreVal,daMu,daSig);
      var saY=plotY+plotH-pSaVal*plotH*0.85;
      var daY=plotY+plotH-pDaVal*plotH*0.85;

      // Dots on curves: radius 7 (#21)
      ctx.beginPath(); ctx.arc(scoreX, saY, 7, 0, Math.PI*2);
      ctx.fillStyle=GREEN; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();

      ctx.beginPath(); ctx.arc(scoreX, daY, 7, 0, Math.PI*2);
      ctx.fillStyle=RED; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    }

    // Arrow from distribution to LR panel
    var lrA=ease(clamp01((a-0.7)/0.3));
    if(lrA>0){
      ctx.globalAlpha=a*lrA;
      drawArrow(plotX+plotW+14, plotY+40, lrX-6, plotY+40, '#ccc');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase D/E: LR result panel (#22-#27)
  function drawLRResult(t){
    if(t<P.D+1.5) return;
    var a=ease(clamp01((t-P.D-1.5)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    // LR panel: 170x210 (#22)
    ctx.fillStyle='#f4f9f4'; ctx.strokeStyle=GREEN; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(lrX,lrY,lrW,lrH,10); ctx.fill(); ctx.stroke();

    // "Likelihood Ratio" label: 20px (#23)
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Likelihood Ratio', lrX+lrW/2, lrY+28, '#444');

    // Formula: 16px (#24)
    ctx.font='16px "Noto Sans",sans-serif';
    haloText('P(s | H\u2081)', lrX+lrW/2, lrY+58, GREEN);

    // Fraction line
    ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(lrX+30, lrY+66); ctx.lineTo(lrX+lrW-30, lrY+66); ctx.stroke();

    haloText('P(s | H\u2082)', lrX+lrW/2, lrY+84, RED);

    // LR value: 36px bold (#25)
    var va=ease(clamp01((a-0.3)/0.5));
    if(va>0){
      ctx.globalAlpha=a*va;
      ctx.font='700 36px "Google Sans","Noto Sans",sans-serif';
      haloText(LR, lrX+lrW/2, lrY+130, GREEN);

      ctx.font='14px "Noto Sans",sans-serif';
      haloText('Evidence supports', lrX+lrW/2, lrY+158, '#888');

      // "same authorship" label: 18px (#26)
      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      haloText('same authorship', lrX+lrW/2, lrY+180, GREEN);

      // REMOVED interpretation scale (#27)
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // REMOVED drawPipeline entirely (#2)

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawTitle(t);
    drawDocuments(t);
    drawEmbedding(t);
    drawScore(t);
    drawDistributions(t);
    drawLRResult(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
