<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FlexTPP Animation</title>
<style>
  body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  canvas { display: block; margin: 0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W = 780, H = 640, dpr = window.devicePixelRatio || 1;
  var canvas = document.getElementById('c');
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r];
      var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var SILVER='#636E80', ROSE='#B0868A', SANGUINE='#C2696C', VIOLET='#7B5EC0';
  var BG='#fdfcfb';
  var CONT_COL=ROSE, DISC_COL='#5656A2';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }

  // Halo text default stroke: 5px (was 3px)
  function haloText(text,x,y,fill,hp){
    hp=hp||5; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  // Token definitions — EHR-like events
  var tokens = [
    {text:'Δt=0.012', type:'cont', evStart:true, evLabel:'Day 1'},
    {text:'LAB RESULT', type:'disc'},
    {text:'Serum Glucose', type:'disc'},
    {text:'116.0', type:'cont'},

    {text:'Δt=7.251', type:'cont', evStart:true, evLabel:'Day 8'},
    {text:'PROCEDURE', type:'disc'},
    {text:'Blood coll.', type:'disc'},

    {text:'Δt=0.301', type:'cont', evStart:true, evLabel:'Day 8'},
    {text:'LAB RESULT', type:'disc'},
    {text:'Whole Glucose', type:'disc'},
    {text:'102.0', type:'cont'},

    {text:'Δt=5.24', type:'cont', evStart:true, evLabel:'Day 13'},
    {text:'PROCEDURE', type:'disc'},
    {text:'CBC Panel', type:'disc'},

    {text:'Δt=2.31', type:'cont', evStart:true, evLabel:'Day 15'},
    {text:'LAB RESULT', type:'disc'},
    {text:'HbA1c', type:'disc'},
    {text:'7.2%', type:'cont'}
  ];
  var N_TOK = tokens.length;

  // Compute token widths — using larger font for measurement (18px bold)
  ctx.font = '700 18px "Google Sans","Noto Sans",sans-serif';
  var tokW = tokens.map(function(tok){ return Math.max(90, ctx.measureText(tok.text).width + 28); });

  // Compute appearance times
  var tokTime = [];
  var tt = 1.5;
  for(var i=0; i<N_TOK; i++){
    if(tokens[i].evStart && i>0) tt += 0.4;
    tokTime.push(tt);
    tt += 0.55;
  }
  var GEN_END = tt + 1.0;
  var LOOP = GEN_END + 3.0;

  // Pre-generate random bar heights and density shapes for each token
  var discBars = [];
  var contCurve = [];
  for(var i=0; i<N_TOK; i++){
    var bars = [];
    for(var j=0; j<5; j++) bars.push(0.15 + Math.random()*0.85);
    // Make one bar dominant
    var maxIdx = Math.floor(Math.random()*5);
    bars[maxIdx] = 0.85 + Math.random()*0.15;
    discBars.push(bars);
    // Density: peak position and width
    contCurve.push({mu: 0.3+Math.random()*0.4, sigma: 0.08+Math.random()*0.12});
  }

  // Shifted up since patient badge is removed: was 235, now 185
  var TOK_Y = 185, TOK_H = 48, TOK_GAP = 6, EVENT_XGAP = 22;
  var RIBBON_LEFT = 60;

  // Smooth scroll state
  var scrollX = 0, scrollTarget = 0;

  var startTime = null;
  function getT(){ return ((performance.now()/1000)-startTime) % LOOP; }

  // Title: 30px bold, no subtitle
  function drawTitle(t){
    var a = clamp01(t/0.6);
    ctx.save(); ctx.globalAlpha = ease(a);
    ctx.font = '700 30px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign = 'center';
    haloText('FlexTPP: Mixed-Type Event Sequences', W/2, 42, '#2a2d35');
    ctx.globalAlpha = 1; ctx.restore();
  }

  // Patient badge REMOVED

  function getCurIdx(t){
    var idx = -1;
    for(var i=N_TOK-1; i>=0; i--){ if(t>=tokTime[i]){ idx=i; break; } }
    return idx;
  }

  function drawTokenRibbon(t){
    var curIdx = getCurIdx(t);
    if(curIdx < 0) return;

    // Compute cumulative x positions
    var xpos = [];
    var cx = 0;
    for(var i=0; i<N_TOK; i++){
      if(tokens[i].evStart && i>0) cx += EVENT_XGAP;
      xpos.push(cx);
      cx += tokW[i] + TOK_GAP;
    }

    // Scroll target: keep current token near x=520
    var TARGET_X = 500;
    scrollTarget = Math.max(0, xpos[curIdx] + tokW[curIdx]/2 - TARGET_X);
    // Smooth interpolation
    scrollX += (scrollTarget - scrollX) * 0.08;

    ctx.save();

    // "Generated sequence:" label — 24px (was 14px)
    ctx.font = '600 24px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign = 'left';
    haloText('Generated sequence:', RIBBON_LEFT, TOK_Y - 55, '#555');

    // Type legend — 18px text (was 11px), 18x18 squares (was 12x12)
    ctx.font = '18px "Noto Sans",sans-serif';
    var legX = 480;
    ctx.beginPath(); ctx.roundRect(legX, TOK_Y-72, 18, 18, 4);
    ctx.fillStyle = CONT_COL; ctx.globalAlpha=0.25; ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle=CONT_COL; ctx.lineWidth=2.25; ctx.stroke();
    haloText('continuous', legX+24, TOK_Y-56, '#888');

    legX += 140;
    ctx.beginPath(); ctx.roundRect(legX, TOK_Y-72, 18, 18, 4);
    ctx.fillStyle = DISC_COL; ctx.globalAlpha=0.25; ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle=DISC_COL; ctx.lineWidth=2.25; ctx.stroke();
    haloText('discrete', legX+24, TOK_Y-56, '#888');

    // Draw event separators and labels
    for(var i=0; i<N_TOK; i++){
      if(!tokens[i].evStart) continue;
      if(t < tokTime[i]) continue;
      var ap = clamp01((t - tokTime[i])/0.3);
      var x = RIBBON_LEFT + xpos[i] - scrollX;
      if(x < 20 || x > W-20) continue;
      ctx.globalAlpha = ease(ap) * 0.6;
      if(i > 0){
        ctx.setLineDash([4,4]);
        ctx.strokeStyle = '#bbb';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x-EVENT_XGAP/2, TOK_Y-40);
        ctx.lineTo(x-EVENT_XGAP/2, TOK_Y+TOK_H+10);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.globalAlpha = ease(ap);
      // Day labels: 18px (was 11px)
      ctx.font = '500 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign = 'left';
      haloText(tokens[i].evLabel, x, TOK_Y-28, '#888');
    }

    // Draw tokens
    for(var i=0; i<=curIdx; i++){
      var ap = clamp01((t - tokTime[i])/0.25);
      if(ap <= 0) continue;
      var ea = ease(ap);
      var x = RIBBON_LEFT + xpos[i] - scrollX;
      var w = tokW[i];

      if(x+w < 10 || x > W-10) continue;

      var isCur = (i === curIdx);
      var col = tokens[i].type === 'cont' ? CONT_COL : DISC_COL;

      // Token box — TOK_H=48 (was 34)
      ctx.globalAlpha = ea * (isCur ? 1 : 0.85);
      ctx.fillStyle = tokens[i].type === 'cont' ? '#F5ECED' : '#EEEDF5';
      ctx.strokeStyle = col;
      ctx.lineWidth = isCur ? 3.75 : 2.25;
      ctx.beginPath(); ctx.roundRect(x, TOK_Y, w*ea, TOK_H, 8);
      ctx.fill(); ctx.stroke();

      // Pulse glow on current
      if(isCur && ap > 0.5){
        var pulse = 0.5 + 0.5*Math.sin(t*5);
        ctx.globalAlpha = pulse * 0.15;
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.roundRect(x-4, TOK_Y-4, w+8, TOK_H+8, 10);
        ctx.fill();
        ctx.globalAlpha = ea;
      }

      // Token text — 18px bold (was 12px)
      if(ea > 0.6){
        var ta = clamp01((ea-0.6)/0.4);
        ctx.globalAlpha = ta * (isCur ? 1 : 0.85);
        ctx.font = '700 18px "Google Sans","Noto Sans",sans-serif';
        ctx.textAlign = 'center';
        haloText(tokens[i].text, x+w/2, TOK_Y+TOK_H/2+6, col === CONT_COL ? '#A06568' : '#3B3B70');
      }

      // Type sub-labels REMOVED (cont/disc below tokens)
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawArchitecture(t){
    var a = clamp01((t-0.8)/0.6);
    if(a<=0) return;
    ctx.save(); ctx.globalAlpha = ease(a);

    // Shifted up from 340 to 300; enlarged height from 90 to 120
    var ay = 300, ah = 120;
    var curIdx = getCurIdx(t);
    var curType = curIdx>=0 ? tokens[curIdx].type : null;

    // Background panel
    ctx.fillStyle = '#fafaf8';
    ctx.strokeStyle = '#ddd8d3';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(50, ay, 680, ah, 10);
    ctx.fill(); ctx.stroke();

    // Embedding block — enlarged
    var bx=80, by=ay+18, bw=105, bh=50;
    ctx.fillStyle='#f0f0f5'; ctx.strokeStyle='#bbb'; ctx.lineWidth=2.25;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke();
    // Embedding label: 18px (was 11px)
    ctx.font='600 18px "Google Sans","Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Embedding',bx+bw/2,by+bh/2+6,'#666');

    // + PE: 18px (was 11px)
    ctx.font='18px "Noto Sans",sans-serif';
    haloText('+ PE',bx+bw+18,by+bh/2+6,'#aaa');

    // Arrow from embedding to transformer
    drawArrow(bx+bw+42, by+bh/2, bx+bw+80, by+bh/2, '#bbb');

    // Transformer block — enlarged
    var tx=bx+bw+85, tw=210, tbh=bh+14;
    ctx.fillStyle='#EBE4F8'; ctx.strokeStyle=VIOLET; ctx.lineWidth=3;
    ctx.beginPath(); ctx.roundRect(tx,by-7,tw,tbh,10); ctx.fill(); ctx.stroke();
    // Transformer label: 20px bold (was 13px)
    ctx.font='700 20px "Google Sans","Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Autoregressive',tx+tw/2,by+16,VIOLET);
    haloText('Transformer',tx+tw/2,by+40,VIOLET);

    // Arrows to heads
    var headY = by+tbh/2;
    drawArrow(tx+tw+5, headY-10, tx+tw+50, headY-24, '#bbb');
    drawArrow(tx+tw+5, headY+10, tx+tw+50, headY+24, '#bbb');

    // Discrete head — enlarged
    var dx=tx+tw+55, dw=130;
    var discActive = curType==='disc';
    ctx.fillStyle = discActive?'#EEEDF5':'#f5f5f5';
    ctx.strokeStyle = discActive?DISC_COL:'#ccc';
    ctx.lineWidth = discActive?3:1.5;
    ctx.beginPath(); ctx.roundRect(dx,by-16,dw,36,6); ctx.fill(); ctx.stroke();
    // Head label: 18px (was 11px)
    ctx.font='600 18px "Google Sans","Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('φ_disc → Cat()',dx+dw/2,by+8,discActive?'#3B3B70':'#999');

    // Continuous head — enlarged
    var cy2=by+bh-8;
    var contActive = curType==='cont';
    ctx.fillStyle = contActive?'#F5ECED':'#f5f5f5';
    ctx.strokeStyle = contActive?CONT_COL:'#ccc';
    ctx.lineWidth = contActive?3:1.5;
    ctx.beginPath(); ctx.roundRect(dx,cy2,dw,36,6); ctx.fill(); ctx.stroke();
    // Head label: 18px (was 11px)
    ctx.font='600 18px "Google Sans","Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('φ_cont → Flow()',dx+dw/2,cy2+22,contActive?'#A06568':'#999');

    // Causal mask note: 16px (was 10px)
    ctx.font='italic 16px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('causal attention mask',tx+tw/2,ay+ah-10,'#bbb');

    ctx.globalAlpha=1; ctx.restore();
  }

  // Arrow with 50% larger heads and 50% thicker lines
  function drawArrow(x1,y1,x2,y2,col){
    ctx.strokeStyle=col; ctx.lineWidth=2.25;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    var aLen = 9; // was 6, now 50% larger
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-aLen*Math.cos(ang-0.4),y2-aLen*Math.sin(ang-0.4));
    ctx.lineTo(x2-aLen*Math.cos(ang+0.4),y2-aLen*Math.sin(ang+0.4));
    ctx.closePath();
    ctx.fillStyle=col; ctx.fill();
  }

  function drawDistributions(t){
    var curIdx = getCurIdx(t);
    if(curIdx < 0) return;
    var a = clamp01((t - tokTime[curIdx])/0.3);
    if(a<=0) return;

    ctx.save(); ctx.globalAlpha = ease(a);
    // Shifted up from 455 to 438, slightly taller
    var py = 438, pw = 295, ph = 160;

    // Discrete distribution panel
    var dx = 70;
    ctx.fillStyle='#fafaf8'; ctx.strokeStyle='#ddd8d3'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(dx,py,pw,ph,10); ctx.fill(); ctx.stroke();
    // Panel header: 20px (was 12px)
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Discrete Head: Categorical', dx+pw/2, py+24, DISC_COL);

    // Bar chart
    var bars = discBars[curIdx];
    var barW = 38, barGap = 10, barMaxH = 85;
    var bx0 = dx + (pw - (bars.length*(barW+barGap)-barGap))/2;
    var barBase = py+ph-28;
    var labels = ['Lab','Proc','Med','Diag','EOS'];
    for(var j=0; j<bars.length; j++){
      var bh = bars[j]*barMaxH*ease(a);
      var bx = bx0 + j*(barW+barGap);
      ctx.fillStyle = DISC_COL;
      ctx.globalAlpha = ease(a) * (tokens[curIdx].type==='disc'?0.7:0.25);
      ctx.beginPath(); ctx.roundRect(bx, barBase-bh, barW, bh, 4); ctx.fill();
      ctx.globalAlpha = ease(a);
      // Bar labels: 16px (was 9px)
      ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText(labels[j], bx+barW/2, barBase+17, '#aaa');
    }

    // Continuous distribution panel
    var cx2 = 415;
    ctx.globalAlpha = ease(a);
    ctx.fillStyle='#fafaf8'; ctx.strokeStyle='#ddd8d3'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(cx2,py,pw,ph,10); ctx.fill(); ctx.stroke();
    // Panel header: 20px (was 12px)
    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('Continuous Head: NF Density', cx2+pw/2, py+24, CONT_COL);

    // Density curve
    var crvLeft=cx2+25, crvRight=cx2+pw-25, crvBase=py+ph-30, crvTop=py+42;
    var crvH=crvBase-crvTop;
    var cc = contCurve[curIdx];
    ctx.beginPath();
    ctx.moveTo(crvLeft, crvBase);
    var contAlpha = tokens[curIdx].type==='cont' ? 0.7 : 0.25;
    for(var px=0; px<=1; px+=0.01){
      var xp = crvLeft + px*(crvRight-crvLeft);
      var g = Math.exp(-0.5*Math.pow((px-cc.mu)/cc.sigma,2));
      var yp = crvBase - g*crvH*0.85*ease(a);
      ctx.lineTo(xp, yp);
    }
    ctx.lineTo(crvRight, crvBase);
    ctx.closePath();
    ctx.fillStyle = CONT_COL;
    ctx.globalAlpha = ease(a)*contAlpha*0.3;
    ctx.fill();
    ctx.globalAlpha = ease(a)*contAlpha;
    ctx.strokeStyle = CONT_COL;
    ctx.lineWidth = 3;
    // Redraw just the curve part (not the base line)
    ctx.beginPath();
    for(var px=0; px<=1; px+=0.01){
      var xp = crvLeft + px*(crvRight-crvLeft);
      var g = Math.exp(-0.5*Math.pow((px-cc.mu)/cc.sigma,2));
      var yp = crvBase - g*crvH*0.85*ease(a);
      if(px===0) ctx.moveTo(xp,yp); else ctx.lineTo(xp,yp);
    }
    ctx.stroke();

    // Axis line
    ctx.globalAlpha = ease(a)*0.4;
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(crvLeft,crvBase); ctx.lineTo(crvRight,crvBase); ctx.stroke();
    // Axis label: 16px (was 9px)
    ctx.font='16px "Noto Sans",sans-serif'; ctx.textAlign='center';
    ctx.globalAlpha = ease(a);
    haloText('value', cx2+pw/2, crvBase+18, '#aaa');

    // Current prediction label — 18px (was 11px)
    if(curIdx >= 0){
      ctx.font='500 18px "Noto Sans",sans-serif'; ctx.textAlign='center';
      var predText = 'Predicting: ' + tokens[curIdx].text + ' (' + tokens[curIdx].type + ')';
      haloText(predText, W/2, py+ph+24, '#888');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    // drawPatientBadge removed
    drawTokenRibbon(t);
    drawArchitecture(t);
    drawDistributions(t);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
