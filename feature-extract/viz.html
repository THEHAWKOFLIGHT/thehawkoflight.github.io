<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Feature Extraction Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var BLUE='#6C8EBF', ORANGE='#D79B00', GREEN='#82B366', PURPLE='#9673A6';
  var RED='#B85450', BG='#fdfdfe';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function haloText(text,x,y,fill,hp){
    hp=hp||5; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  // ---- Physics-based NaI spectrum (same as barni) ----
  var SPEC_N=512, E_MAX=3000;
  var spectrum=[];
  for(var i=0;i<SPEC_N;i++) spectrum[i]=0;

  function naiSigma(E){ return 1.8*Math.sqrt(Math.max(E,10))/2.355; }
  function addGauss(arr,E,amp){
    var sig=naiSigma(E);
    for(var i=0;i<SPEC_N;i++){
      var e=i*E_MAX/SPEC_N, d=(e-E)/sig;
      arr[i]+=amp*Math.exp(-0.5*d*d);
    }
  }
  function comptonEdge(E){ return E*(2*E/511)/(1+2*E/511); }
  function addCompton(arr,E,amp){
    var Ece=comptonEdge(E);
    for(var i=0;i<SPEC_N;i++){
      var e=i*E_MAX/SPEC_N;
      if(e>Ece+40) continue;
      var s=e/E, kn=1;
      if(s>0&&s<1){ var r=1+s*s/((1-s)*(1+2*E*(1-s)/511)); kn=Math.min(r,3); }
      var fall=1-clamp01((e-Ece)/(naiSigma(Ece)*1.5));
      arr[i]+=amp*0.18*kn*fall;
    }
  }

  var sources=[
    {E:662,amp:1.0},{E:1173,amp:0.55},{E:1332,amp:0.50},
    {E:1461,amp:0.20},{E:59.5,amp:0.45},{E:356,amp:0.35},
    {E:81,amp:0.30},{E:511,amp:0.25},{E:122,amp:0.28}
  ];
  for(var s=0;s<sources.length;s++){
    addGauss(spectrum,sources[s].E,sources[s].amp);
    addCompton(spectrum,sources[s].E,sources[s].amp);
    if(sources[s].E>100){
      var bsE=sources[s].E/(1+2*sources[s].E/511);
      addGauss(spectrum,bsE,sources[s].amp*0.08);
    }
  }
  for(var i=0;i<SPEC_N;i++) spectrum[i]+=0.08*Math.exp(-i*E_MAX/SPEC_N/300)+0.015;
  addGauss(spectrum,75,0.18); addGauss(spectrum,85,0.10); addGauss(spectrum,633,0.06);
  var specMax=0;
  for(var i=0;i<SPEC_N;i++) if(spectrum[i]>specMax) specMax=spectrum[i];
  for(var i=0;i<SPEC_N;i++) spectrum[i]=spectrum[i]/specMax*0.92;
  var specNoise=[];
  for(var i=0;i<SPEC_N;i++) specNoise[i]=(Math.random()-0.5)*0.015;

  // PCA bars (fake eigenvalue magnitudes, decaying)
  var N_PCA=20;
  var pcaBars=[];
  for(var i=0;i<N_PCA;i++) pcaBars[i]=Math.exp(-i*0.18)*(0.8+Math.random()*0.2);

  // BARNI ROI features (peak regions, normalized counts)
  var roiFeatures=[0.85,0.42,0.68,0.30,0.55,0.20,0.72,0.38,0.15,0.48,0.25,0.60];

  // Feature method definitions
  var methods=[
    {name:'Raw Spectra', dim:'2000 ch', color:BLUE, f1_low:0.35, f1_high:0.88, time:120},
    {name:'PCA', dim:'256 \u2192 20 dim', color:PURPLE, f1_low:0.40, f1_high:0.90, time:45},
    {name:'BARNI Peaks', dim:'ROI features', color:GREEN, f1_low:0.28, f1_high:0.82, time:30}
  ];

  // Phase timing
  var P={
    A:0, A_end:2.0,       // Spectrum draws in
    B:1.8, B_end:4.5,     // Three feature branches
    C:4.2, C_end:6.0,     // MLP classifiers
    D:5.8, D_end:9.5,     // F1 comparison
    E:9.0, E_end:11.0,    // Key insight
    FADE_START:11.5,
    FADE_END:13.0,
    TOTAL:13.5
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=lw||2.25;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-10.5*Math.cos(ang-0.35),y2-10.5*Math.sin(ang-0.35));
    ctx.lineTo(x2-10.5*Math.cos(ang+0.35),y2-10.5*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  // Layout constants for the three-column arrangement
  // Left column: spectrum panel
  var SPEC_SX=30, SPEC_SY=90, SPEC_SW=240, SPEC_SH=140;
  var SPEC_CX=SPEC_SX+SPEC_SW/2, SPEC_CY=SPEC_SY+SPEC_SH/2;

  // Middle column: feature branch boxes
  var BRANCH_X=310, BRANCH_BW=190, BRANCH_BH=85;
  var BRANCH_Y=[75, 220, 370]; // y positions for three branches

  // MLP boxes (between middle and right columns)
  var MLP_X=540, MLP_W=90, MLP_H=55;

  // Right column: results panels
  var RESULTS_RX=660, RESULTS_RW=110;

  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 28px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Feature Extraction for Radionuclide Identification', W/2, 42, '#1a1a1a');
    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase A: spectrum
  function drawSpectrum(t){
    var a=ease(clamp01((t-P.A)/1.0));
    if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a;

    var sx=SPEC_SX, sy=SPEC_SY, sw=SPEC_SW, sh=SPEC_SH;

    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(sx-10,sy-28,sw+20,sh+50,8); ctx.fill(); ctx.stroke();

    ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('NaI(Tl) Spectrum', sx+sw/2, sy-6, '#555');

    // Axes
    ctx.strokeStyle='#ddd'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx,sy+sh); ctx.lineTo(sx+sw,sy+sh); ctx.stroke();

    // Spectrum line
    var drawN=Math.round(SPEC_N*a);
    ctx.beginPath();
    for(var i=0;i<drawN;i++){
      var x=sx+(i/SPEC_N)*sw;
      var v=spectrum[i]+specNoise[i]*a;
      var y=sy+sh-v*sh;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=BLUE; ctx.lineWidth=1.5;
    ctx.stroke();

    // Fill
    ctx.beginPath(); ctx.moveTo(sx,sy+sh);
    for(var i=0;i<drawN;i++){
      var x=sx+(i/SPEC_N)*sw;
      ctx.lineTo(x,sy+sh-(spectrum[i]+specNoise[i]*a)*sh);
    }
    ctx.lineTo(sx+(drawN-1)/SPEC_N*sw,sy+sh); ctx.closePath();
    ctx.fillStyle='rgba(108,142,191,0.08)'; ctx.fill();

    // Axis labels: just "0" and "3000 keV"
    ctx.font='14px "Noto Sans",sans-serif'; ctx.textAlign='center';
    haloText('0', sx, sy+sh+16, '#999');
    haloText('3000 keV', sx+sw, sy+sh+16, '#999');

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase B: three feature branches
  function drawFeatureBranches(t){
    if(t<P.B) return;
    var a=ease(clamp01((t-P.B)/0.8));
    ctx.save();

    // Arrow origin: right side of spectrum panel
    var arrowOriginX=SPEC_SX+SPEC_SW+10;
    var arrowOriginY=SPEC_CY;

    for(var m=0;m<3;m++){
      var delay=m*0.15;
      var ma=ease(clamp01((a-delay)/0.5));
      if(ma<=0) continue;
      ctx.globalAlpha=ma;

      var by=BRANCH_Y[m];
      var method=methods[m];
      var bw=BRANCH_BW, bh=BRANCH_BH;

      // Arrow from spectrum to branch
      drawArrow(arrowOriginX, arrowOriginY, BRANCH_X-4, by+bh/2, '#ccc');

      // Branch box
      ctx.fillStyle='#fafbfd'; ctx.strokeStyle=method.color; ctx.lineWidth=2.7;
      ctx.beginPath(); ctx.roundRect(BRANCH_X,by,bw,bh,6); ctx.fill(); ctx.stroke();

      // Method name
      ctx.font='700 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText(method.name, BRANCH_X+bw/2, by+28, method.color);

      // Dimension label
      ctx.font='16px "Noto Sans",sans-serif';
      haloText(method.dim, BRANCH_X+bw/2, by+52, '#aaa');

      // Mini visualizations inside box (bars only, no sub-labels)
      if(m===0){
        var barW=1.5, nBars=60;
        var bsX=BRANCH_X+20, bsY=by+58, bsH=20;
        for(var i=0;i<nBars;i++){
          var idx=Math.floor(i/nBars*SPEC_N);
          var v=spectrum[idx]*ma;
          ctx.fillStyle='rgba(108,142,191,'+(0.3+v*0.5)+')';
          ctx.fillRect(bsX+i*(barW+1.2), bsY+bsH-v*bsH, barW, v*bsH);
        }
      } else if(m===1){
        var bsX=BRANCH_X+25, bsY=by+58, bsH=20;
        for(var i=0;i<N_PCA;i++){
          var v=pcaBars[i]*ma;
          var barWp=5;
          ctx.fillStyle='rgba(150,115,166,'+(0.4+v*0.4)+')';
          ctx.fillRect(bsX+i*(barWp+2.5), bsY+bsH-v*bsH, barWp, v*bsH);
        }
      } else {
        var bsX=BRANCH_X+20, bsY=by+58, bsH=20;
        for(var i=0;i<roiFeatures.length;i++){
          var v=roiFeatures[i]*ma;
          var barWr=9;
          ctx.fillStyle='rgba(130,179,102,'+(0.4+v*0.4)+')';
          ctx.fillRect(bsX+i*(barWr+3.5), bsY+bsH-v*bsH, barWr, v*bsH);
        }
      }
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase C: MLP classifier block
  function drawClassifier(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.6));
    ctx.save(); ctx.globalAlpha=a;

    var mlpX=MLP_X, mlpW=MLP_W, mlpH=MLP_H;

    for(var m=0;m<3;m++){
      var delay=m*0.1;
      var ca=ease(clamp01((a-delay)/0.4));
      if(ca<=0) continue;
      ctx.globalAlpha=a*ca;

      var by=BRANCH_Y[m]+BRANCH_BH/2-mlpH/2;

      // Arrow from feature box to MLP
      drawArrow(BRANCH_X+BRANCH_BW+4, BRANCH_Y[m]+BRANCH_BH/2, mlpX-4, by+mlpH/2, '#ccc');

      // MLP box
      ctx.fillStyle='#fff8f0'; ctx.strokeStyle=ORANGE; ctx.lineWidth=2.25;
      ctx.beginPath(); ctx.roundRect(mlpX,by,mlpW,mlpH,5); ctx.fill(); ctx.stroke();

      ctx.font='700 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('MLP', mlpX+mlpW/2, by+24, ORANGE);
      ctx.font='14px "Noto Sans",sans-serif';
      haloText('Classifier', mlpX+mlpW/2, by+42, '#ccc');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase D: F1 comparison results
  function drawResults(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.6));
    ctx.save(); ctx.globalAlpha=a;

    // Results panel at bottom spanning full width
    var rx=40, ry=490, rw=420, rh=130;

    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,8); ctx.fill(); ctx.stroke();

    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('F1-Score (High SNR)', rx+rw/2, ry+24, '#444');

    // Horizontal bars
    var barX=rx+120, barMaxW=200, barH=26, barGap=8;
    var barStartY=ry+40;

    for(var m=0;m<3;m++){
      var delay=m*0.15;
      var ba=ease(clamp01(((t-P.D-0.3)-delay)/0.7));
      if(ba<=0) continue;
      ctx.globalAlpha=a*ba;

      var by=barStartY+m*(barH+barGap);
      var method=methods[m];
      var barW=(method.f1_high/1.0)*barMaxW*ba;

      ctx.font='600 16px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='right';
      haloText(method.name, barX-8, by+barH/2+5, method.color);

      ctx.fillStyle='#eef0f4';
      ctx.beginPath(); ctx.roundRect(barX,by,barMaxW,barH,3); ctx.fill();

      ctx.fillStyle=method.color;
      ctx.beginPath(); ctx.roundRect(barX,by,barW,barH,3); ctx.fill();

      if(ba>0.5){
        ctx.globalAlpha=a*ease(clamp01((ba-0.5)/0.5));
        ctx.font='700 18px "Google Sans","Noto Sans",sans-serif';
        ctx.textAlign='left';
        haloText(method.f1_high.toFixed(2), barX+barW+6, by+barH/2+6, method.color);
      }
    }

    // Training time panel (right side of bottom)
    var tx=480, ty2=ry, tw2=280, th2=130;
    ctx.globalAlpha=a;
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(tx,ty2,tw2,th2,8); ctx.fill(); ctx.stroke();

    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Training Time', tx+tw2/2, ty2+24, '#444');

    var times=[{name:'Raw',t:120,col:BLUE},{name:'PCA',t:45,col:PURPLE},{name:'BARNI',t:30,col:GREEN}];
    var tbX=tx+90, tbMaxW=140, tbH=22, tbGap=8, tbStartY=ty2+40;

    for(var i=0;i<times.length;i++){
      var ta=ease(clamp01((a-i*0.1-0.1)/0.5));
      if(ta<=0) continue;
      ctx.globalAlpha=a*ta;

      var tby=tbStartY+i*(tbH+tbGap);
      var tbw=(times[i].t/120)*tbMaxW*ta;

      ctx.font='600 14px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='right';
      haloText(times[i].name, tbX-8, tby+tbH/2+5, times[i].col);

      ctx.fillStyle='#eef0f4';
      ctx.beginPath(); ctx.roundRect(tbX,tby,tbMaxW,tbH,3); ctx.fill();
      ctx.fillStyle=times[i].col;
      ctx.beginPath(); ctx.roundRect(tbX,tby,tbw,tbH,3); ctx.fill();
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawTitle(t);
    drawSpectrum(t);
    drawFeatureBranches(t);
    drawClassifier(t);
    drawResults(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
