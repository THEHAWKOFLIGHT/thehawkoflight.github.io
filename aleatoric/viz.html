<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aleatoric Uncertainty Animation</title>
<style>
  body { margin:0; padding:0; background:transparent; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var W=780, H=640, dpr=window.devicePixelRatio||1;
  var canvas=document.getElementById('c');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!ctx.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number') r=[r,r,r,r]; var tl=r[0]||0;
      this.moveTo(x+tl,y); this.lineTo(x+w-tl,y);
      this.arcTo(x+w,y,x+w,y+tl,tl); this.lineTo(x+w,y+h-tl);
      this.arcTo(x+w,y+h,x+w-tl,y+h,tl); this.lineTo(x+tl,y+h);
      this.arcTo(x,y+h,x,y+h-tl,tl); this.lineTo(x,y+tl);
      this.arcTo(x,y,x+tl,y,tl); this.closePath();
    };
  }

  var BLUE='#6C8EBF', ORANGE='#D79B00', GREEN='#82B366', PURPLE='#9673A6';
  var BG='#fdfdfe';

  function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
  function clamp01(t){ return t<0?0:t>1?1:t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function haloText(text,x,y,fill,hp){
    hp=hp||5; ctx.save();
    ctx.strokeStyle=BG; ctx.lineWidth=hp*2;
    ctx.lineJoin='round'; ctx.miterLimit=2;
    ctx.strokeText(text,x,y);
    ctx.fillStyle=fill; ctx.fillText(text,x,y);
    ctx.restore();
  }

  // ---- Grid patterns ----
  var G=14;

  // Ground truth precipitation: storm with sharp edges
  var truth=[];
  for(var gy=0;gy<G;gy++){
    truth[gy]=[];
    for(var gx=0;gx<G;gx++){
      var dx=(gx-8)/3, dy=(gy-5)/3;
      var d=Math.sqrt(dx*dx+dy*dy);
      var v=Math.max(0, 1-d*0.7);
      // Sharp edges: threshold
      v=v>0.3?v:v*0.2;
      // Secondary feature
      var dx2=(gx-3)/2, dy2=(gy-10)/2;
      var v2=Math.max(0, Math.exp(-dx2*dx2-dy2*dy2)*0.7);
      v2=v2>0.25?v2:v2*0.15;
      truth[gy][gx]=Math.min(1, v+v2);
    }
  }

  // MSE-smoothed version (blurred truth)
  var smooth=[];
  for(var gy=0;gy<G;gy++){
    smooth[gy]=[];
    for(var gx=0;gx<G;gx++){
      var sum=0, cnt=0;
      for(var dy=-2;dy<=2;dy++){
        for(var dx=-2;dx<=2;dx++){
          var ny=gy+dy, nx=gx+dx;
          if(ny>=0&&ny<G&&nx>=0&&nx<G){
            var w=Math.exp(-(dx*dx+dy*dy)/3);
            sum+=truth[ny][nx]*w; cnt+=w;
          }
        }
      }
      smooth[gy][gx]=sum/cnt*0.75; // compressed dynamic range
    }
  }

  // Satellite observation (MW radiances — inverse of precip)
  var satellite=[];
  for(var gy=0;gy<G;gy++){
    satellite[gy]=[];
    for(var gx=0;gx<G;gx++){
      satellite[gy][gx]=0.7-truth[gy][gx]*0.5+(Math.random()-0.5)*0.08;
    }
  }

  // Ensemble members: truth + small random perturbations
  var N_ENS=6;
  var ensMembers=[];
  for(var e=0;e<N_ENS;e++){
    ensMembers[e]=[];
    for(var gy=0;gy<G;gy++){
      ensMembers[e][gy]=[];
      for(var gx=0;gx<G;gx++){
        var noise=(Math.random()-0.5)*0.2;
        // Edge perturbation: more noise near edges
        var edgeNoise=0;
        if(gy>0&&gy<G-1&&gx>0&&gx<G-1){
          var grad=Math.abs(truth[gy][gx]-truth[gy-1][gx])
                  +Math.abs(truth[gy][gx]-truth[gy][gx-1]);
          edgeNoise=(Math.random()-0.5)*grad*1.5;
        }
        ensMembers[e][gy][gx]=Math.max(0,Math.min(1, truth[gy][gx]+noise+edgeNoise));
      }
    }
  }

  // Ensemble mean
  var ensMean=[];
  for(var gy=0;gy<G;gy++){
    ensMean[gy]=[];
    for(var gx=0;gx<G;gx++){
      var s=0;
      for(var e=0;e<N_ENS;e++) s+=ensMembers[e][gy][gx];
      ensMean[gy][gx]=s/N_ENS;
    }
  }

  // Uncertainty (ensemble std)
  var ensUncert=[];
  var maxU=0;
  for(var gy=0;gy<G;gy++){
    ensUncert[gy]=[];
    for(var gx=0;gx<G;gx++){
      var s=0;
      for(var e=0;e<N_ENS;e++){
        var d=ensMembers[e][gy][gx]-ensMean[gy][gx];
        s+=d*d;
      }
      ensUncert[gy][gx]=Math.sqrt(s/N_ENS);
      if(ensUncert[gy][gx]>maxU) maxU=ensUncert[gy][gx];
    }
  }
  // Normalize uncertainty
  for(var gy=0;gy<G;gy++)
    for(var gx=0;gx<G;gx++)
      ensUncert[gy][gx]=ensUncert[gy][gx]/maxU;

  // Color maps
  function precipColor(v){
    if(v<0.05) return 'rgba(200,210,230,0.3)';
    var r,g,b;
    if(v<0.33){ var t=v/0.33; r=lerp(50,50,t); g=lerp(100,180,t); b=lerp(200,100,t); }
    else if(v<0.66){ var t=(v-0.33)/0.33; r=lerp(50,230,t); g=lerp(180,200,t); b=lerp(100,50,t); }
    else{ var t=(v-0.66)/0.34; r=lerp(230,200,t); g=lerp(200,50,t); b=lerp(50,30,t); }
    return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
  }
  function satColor(v){
    v=Math.max(0,Math.min(1,v));
    return 'rgb('+Math.round(180+v*70)+','+Math.round(100+v*100)+','+Math.round(50+v*50)+')';
  }
  function uncertColor(v){
    v=Math.max(0,Math.min(1,v));
    return 'rgb('+Math.round(240-v*100)+','+Math.round(240-v*140)+','+Math.round(240-v*50)+')';
  }

  // Draw grid
  function drawGrid(x,y,sz,grid,colorFn){
    var cellSz=sz/G;
    for(var gy=0;gy<G;gy++){
      for(var gx=0;gx<G;gx++){
        ctx.fillStyle=colorFn(grid[gy][gx]);
        ctx.fillRect(x+gx*cellSz, y+gy*cellSz, cellSz+0.5, cellSz+0.5);
      }
    }
    ctx.strokeStyle='#ccc'; ctx.lineWidth=0.8;
    ctx.strokeRect(x,y,sz,sz);
  }

  function drawArrow(x1,y1,x2,y2,col,lw){
    ctx.strokeStyle=col; ctx.lineWidth=lw||2.25;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1);
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-10.5*Math.cos(ang-0.35),y2-10.5*Math.sin(ang-0.35));
    ctx.lineTo(x2-10.5*Math.cos(ang+0.35),y2-10.5*Math.sin(ang+0.35));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }

  // Phase timing
  var P={
    A:0, A_end:1.5,       // Satellite input
    B:1.2, B_end:3.2,     // MSE vs Sharp loss comparison
    C:3.0, C_end:5.8,     // Generative ensemble
    D:5.5, D_end:7.8,     // Ensemble mean + uncertainty
    FADE_START:8.8,
    FADE_END:10.2,
    TOTAL:11.0
  };

  var startTime=null;
  function getT(){ return ((performance.now()/1000)-startTime)%P.TOTAL; }

  function drawTitle(t){
    var a=ease(clamp01(t/0.6));
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='700 28px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Aleatoric Uncertainty in Precipitation Retrieval', W/2, 38, '#1a1a1a');
    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase A: satellite input
  function drawInput(t){
    var a=ease(clamp01((t-P.A)/0.8));
    if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a;

    var panelX=25, panelY=55, panelW=365, panelH=200;
    var imgSz=140;
    var ix=panelX+(panelW-imgSz)/2, iy=panelY+42;

    // Panel (same width as loss comparison below)
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(panelX,panelY,panelW,panelH,8); ctx.fill(); ctx.stroke();

    ctx.font='600 20px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Satellite Observation', panelX+panelW/2, panelY+24, ORANGE);

    // Satellite grid
    drawGrid(ix, iy, imgSz, satellite, satColor);

    // Subtitle
    ctx.font='15px "Noto Sans",sans-serif';
    haloText('Under-constrained inverse problem', panelX+panelW/2, panelY+panelH-10, '#aaa');

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase B: MSE vs alternative loss comparison
  function drawLossComparison(t){
    if(t<P.B) return;
    var a=ease(clamp01((t-P.B)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    var bx=25, by=275, bw=365, bh=235;

    // Panel
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke();

    ctx.font='600 22px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Objective Function \u2192 Regularization', bx+bw/2, by+24, '#444');

    // MSE output (smooth/blurry)
    var gridSz=90;
    var msX=bx+30, msY=by+44;
    var msA=ease(clamp01((a-0.2)/0.5));
    if(msA>0){
      ctx.globalAlpha=a*msA;

      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('MSE Loss', msX+gridSz/2, msY+14, '#c0392b');

      drawGrid(msX, msY+22, gridSz, smooth, precipColor);

      // "Smooth / blurry" label
      ctx.font='16px "Noto Sans",sans-serif';
      haloText('Blurry, low variance', msX+gridSz/2, msY+gridSz+40, '#c0392b');

      // X mark (scaled up)
      ctx.strokeStyle='#c0392b'; ctx.lineWidth=4;
      ctx.beginPath();
      ctx.moveTo(msX+gridSz+8, msY+gridSz/2+14);
      ctx.lineTo(msX+gridSz+24, msY+gridSz/2+30);
      ctx.moveTo(msX+gridSz+24, msY+gridSz/2+14);
      ctx.lineTo(msX+gridSz+8, msY+gridSz/2+30);
      ctx.stroke();
    }

    // Sharp/alternative output
    var shX=bx+bw-30-gridSz, shY=by+44;
    var shA=ease(clamp01((a-0.5)/0.5));
    if(shA>0){
      ctx.globalAlpha=a*shA;

      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('Alternative Loss', shX+gridSz/2, shY+14, GREEN);

      drawGrid(shX, shY+22, gridSz, truth, precipColor);

      ctx.font='16px "Noto Sans",sans-serif';
      haloText('Sharp, preserves extremes', shX+gridSz/2, shY+gridSz+40, GREEN);

      // Check mark (scaled up)
      ctx.strokeStyle=GREEN; ctx.lineWidth=4;
      ctx.beginPath();
      ctx.moveTo(shX+gridSz+6, shY+gridSz/2+20);
      ctx.lineTo(shX+gridSz+14, shY+gridSz/2+28);
      ctx.lineTo(shX+gridSz+28, shY+gridSz/2+10);
      ctx.stroke();
    }

    // "vs" between them
    if(msA>0.5 && shA>0.5){
      ctx.globalAlpha=a*Math.min(msA,shA);
      ctx.font='italic 20px "Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('vs', bx+bw/2, by+100, '#bbb');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase C: Generative ensemble
  function drawEnsemble(t){
    if(t<P.C) return;
    var a=ease(clamp01((t-P.C)/0.6));
    ctx.save(); ctx.globalAlpha=a;

    var ex=415, ey=55, ew=350, eh=300;

    // Panel
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(ex,ey,ew,eh,8); ctx.fill(); ctx.stroke();

    ctx.font='600 22px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Conditional Generative Model', ex+ew/2, ey+26, PURPLE);

    // 2x3 grid of ensemble members
    var memSz=70;
    var memGapX=10, memGapY=30;
    var cols=3, rows=2;
    var gridW=cols*(memSz+memGapX)-memGapX;
    var gridH=rows*(memSz+memGapY)-memGapY;
    var startX=ex+(ew-gridW)/2;
    var startY=ey+48;

    for(var e=0;e<N_ENS;e++){
      var row=Math.floor(e/cols), col=e%cols;
      var delay=e*0.1;
      var ea=ease(clamp01(((t-P.C-0.4)-delay)/0.4));
      if(ea<=0) continue;
      ctx.globalAlpha=a*ea;

      var mx=startX+col*(memSz+memGapX);
      var my=startY+row*(memSz+memGapY);

      drawGrid(mx, my, memSz, ensMembers[e], precipColor);

      ctx.font='14px "Noto Sans",sans-serif'; ctx.textAlign='center';
      haloText('Member '+(e+1), mx+memSz/2, my+memSz+14, '#bbb');
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  // Phase D: Ensemble mean + uncertainty
  function drawResults(t){
    if(t<P.D) return;
    var a=ease(clamp01((t-P.D)/0.8));
    ctx.save(); ctx.globalAlpha=a;

    var rx=415, ry=380, rw=350, rh=185;

    // Panel
    ctx.fillStyle='#fafbfd'; ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,8); ctx.fill(); ctx.stroke();

    ctx.font='600 22px "Google Sans","Noto Sans",sans-serif';
    ctx.textAlign='center';
    haloText('Ensemble Statistics', rx+rw/2, ry+24, '#444');

    var gridSz=85;

    // Ensemble mean
    var mX=rx+rw/2-gridSz-20, mY=ry+50;
    var ma=ease(clamp01((a-0.1)/0.6));
    if(ma>0){
      ctx.globalAlpha=a*ma;
      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('Mean', mX+gridSz/2, mY, GREEN);
      drawGrid(mX, mY+10, gridSz, ensMean, precipColor);
    }

    // Uncertainty
    var uX=rx+rw/2+20, uY=ry+50;
    var ua=ease(clamp01((a-0.3)/0.6));
    if(ua>0){
      ctx.globalAlpha=a*ua;
      ctx.font='600 18px "Google Sans","Noto Sans",sans-serif';
      ctx.textAlign='center';
      haloText('Uncertainty', uX+gridSz/2, uY, '#B85450');
      drawGrid(uX, uY+10, gridSz, ensUncert, uncertColor);
    }

    ctx.globalAlpha=1; ctx.restore();
  }

  function frame(){
    if(startTime===null) startTime=performance.now()/1000;
    var t=getT();
    ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    // Global fade
    var fadeIn=clamp01(t/0.8);
    var fadeOut=1-clamp01((t-P.FADE_START)/(P.FADE_END-P.FADE_START));
    var globalFade=Math.min(fadeIn, fadeOut);
    ctx.globalAlpha=ease(globalFade);

    drawInput(t);
    drawLossComparison(t);
    drawEnsemble(t);
    drawResults(t);

    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
